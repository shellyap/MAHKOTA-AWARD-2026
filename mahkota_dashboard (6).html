        'Koko Sekolah: Cemerlang SKM (Sekolah Kurang Murid)', 'Koko Sekolah: PAJSK Cemerlang SR',

        'Sukan Guru: Pegawai Teknik & Pembangunan Sukan Cemerlang', 'Sukan Sekolah: Pengurusan Terbaik SR',

    };

    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [recipients, setRecipients] = useState([]);
      const [categories, setCategories] = useState(INITIAL_CATEGORIES);
      const [user, setUser] = useState(null);
      const [syncStatus, setSyncStatus] = useState('Connecting...');
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      
      const [drafts, setDrafts] = useState({});

      const [modal, setModal] = useState({
        isOpen: false,
        title: '',
        message: '',
        type: 'alert',
        inputValue: '',
        onConfirm: null
      });

      const showAlert = (title, message) => {
        setModal({ isOpen: true, title, message, type: 'alert', inputValue: '', onConfirm: null });
      };

      const showConfirm = (title, message, onConfirm) => {
        setModal({ isOpen: true, title, message, type: 'confirm', inputValue: '', onConfirm });
      };

      const showPrompt = (title, message, onConfirm) => {
        setModal({ isOpen: true, title, message, type: 'prompt', inputValue: '', onConfirm });
      };

      // Firebase Init & Auth
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("Auth error:", error);
            setSyncStatus('Offline');
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (u) => {
          setUser(u);
          if (!u) setSyncStatus('Offline');
        });
        return () => unsubscribe();
      }, []);

      // Real-time Data Fetching
      useEffect(() => {
        if (!user) return;

        setSyncStatus('Syncing...');
        
        const dataRef = collection(db, 'artifacts', appId, 'public', 'data', 'recipients');
        const unsubscribeData = onSnapshot(
          dataRef,
          (snapshot) => {
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            setRecipients(data);
            setSyncStatus('Live');
          },
          (error) => {
            console.error("Firestore error:", error);
            setSyncStatus('Error');
          }
        );

        const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'categories_config');
        const unsubscribeConfig = onSnapshot(
          configRef,
          (docSnap) => {
            if (docSnap.exists()) {
              setCategories(docSnap.data().categories);
            } else {
              setCategories(INITIAL_CATEGORIES);
            }
          },
          (error) => {
            console.error("Firestore config error:", error);
          }
        );

        return () => {
          unsubscribeData();
          unsubscribeConfig();
        };
      }, [user]);

      const stats = useMemo(() => {
        const counts = CEREMONIES.reduce((acc, curr) => {
          acc[curr.id] = 0;
          return acc;
        }, {});
        
        recipients.forEach(r => {
          if (counts[r.ceremony] !== undefined) {
            counts[r.ceremony]++;
          }
        });
        return counts;
      }, [recipients]);

      const handleDraftChange = (category, field, value) => {
        setDrafts(prev => ({
          ...prev,
          [category]: {
            ...(prev[category] || { salutation: 'Encik', fullName: '', icNumber: '', schoolUnit: '', pic: '' }),
            [field]: value
          }
        }));
      };

      const handleSaveDraft = (ceremonyId, category) => {
        const draft = drafts[category];
        if (!draft || !draft.fullName || !draft.icNumber || !draft.schoolUnit || !draft.pic) {
          showAlert("Maklumat Tidak Lengkap", "Sila isi semua ruangan (Nama, No. KP, Sekolah, PIC).");
          return;
        }
        
        const proceedWithSave = async () => {
          const newId = Date.now().toString();
          const newRecipient = {
            id: newId,
            ceremony: ceremonyId,
            category: category,
            salutation: draft.salutation || 'Encik',
            fullName: draft.fullName,
            icNumber: draft.icNumber,
            schoolUnit: draft.schoolUnit,
            pic: draft.pic,
            createdAt: Date.now(),
            createdBy: user?.uid || 'unknown'
          };

          try {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'recipients', newId);
            await setDoc(docRef, newRecipient);

            setDrafts(prev => ({
              ...prev,
              [category]: {
                salutation: draft.salutation || 'Encik',
                fullName: '',
                icNumber: '',
                schoolUnit: '',
                pic: draft.pic
              }
            }));
          } catch (err) {
            console.error("Error saving data:", err);
            showAlert("Ralat", "Gagal menyimpan data. Sila semak sambungan internet anda.");
          }
        };

        const currentCount = stats[ceremonyId];
        const quota = CEREMONIES.find(c => c.id === ceremonyId).quota;
        
        if (currentCount >= quota) {
          showConfirm(
            "Amaran Kuota Penuh", 
            `Anda telah mencapai had kuota (${quota}) untuk majlis ini. Tambah juga?`, 
            proceedWithSave
          );
        } else {
          proceedWithSave();
        }
      };

      const handleDelete = (id) => {
        showConfirm("Padam Rekod", "Adakah anda pasti mahu memadam rekod ini?", async () => {
          try {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'recipients', id);
            await deleteDoc(docRef);
          } catch (err) {
            console.error("Error deleting data:", err);
            showAlert("Ralat", "Gagal memadam rekod.");
          }
        });
      };

      const handleAddCategory = (ceremonyId) => {
        showPrompt("Tambah Kategori Baharu", "Sila masukkan nama kategori anugerah baharu:", async (newCategory) => {
          if (!newCategory || newCategory.trim() === '') return;
          
          const updatedCategories = {
            ...categories,
            [ceremonyId]: [...(categories[ceremonyId] || []), newCategory.trim()]
          };

          try {
            const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'categories_config');
            await setDoc(configRef, { categories: updatedCategories });
          } catch (err) {
            console.error("Error adding category:", err);
            showAlert("Ralat", "Gagal menyimpan kategori baharu.");
          }
        });
      };

      const handleDeleteCategory = (ceremonyId, categoryName) => {
        const hasRecipients = recipients.some(r => r.ceremony === ceremonyId && r.category === categoryName);
        
        if (hasRecipients) {
          showAlert("Tindakan Dihalang", "Kategori ini mempunyai rekod penerima. Sila padam rekod penerima terlebih dahulu sebelum memadam kategori.");
          return;
        }

        showConfirm("Padam Kategori", `Adakah anda pasti mahu memadam kategori "${categoryName}" secara kekal?`, async () => {
          const updatedCategories = {
            ...categories,
            [ceremonyId]: (categories[ceremonyId] || []).filter(c => c !== categoryName)
          };

          try {
            const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'categories_config');
            await setDoc(configRef, { categories: updatedCategories });
          } catch (err) {
            console.error("Error deleting category:", err);
            showAlert("Ralat", "Gagal memadam kategori.");
          }
        });
      };

      const exportToCSV = (ceremonyId) => {
        const filtered = ceremonyId === 'all' 
          ? recipients 
          : recipients.filter(r => r.ceremony === ceremonyId);
        
        if (filtered.length === 0) {
          showAlert("Tiada Data", "Tiada rekod setakat ini untuk dieksport.");
          return;
        }

        const headers = ['No.', 'Salutation', 'Full Name (IC)', 'IC Number', 'Name of School / Unit', 'Award Category', 'Ceremony', 'PIC / Sector'];
        
        const rows = filtered.map((r, index) => [
          index + 1,
          `"${r.salutation}"`,
          `"${r.fullName}"`,
          `"${r.icNumber}"`,
          `"${r.schoolUnit}"`,
          `"${r.category}"`,
          `"${CEREMONIES.find(c => c.id === r.ceremony)?.name || r.ceremony}"`,
          `"${r.pic}"`
        ]);

        const csvContent = [headers.join(','), ...rows.map(e => e.join(','))].join('\n');
        
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `Recipients_${ceremonyId === 'all' ? 'All' : ceremonyId.toUpperCase()}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      // ----------------------------------------------------------------------
      // 📊 MASTER ANALYTICS COMPUTATIONS
      // ----------------------------------------------------------------------
      const totalRecipients = recipients.length;
      const totalQuota = CEREMONIES.reduce((sum, c) => sum + c.quota, 0);
      const overallFillRate = totalQuota > 0 ? Math.round((totalRecipients / totalQuota) * 100) : 0;
      
      const categoryStatus = useMemo(() => {
        let totalCats = 0;
        let filledCats = 0;
        Object.keys(categories).forEach(ceremonyId => {
          categories[ceremonyId].forEach(catName => {
            totalCats++;
            const count = recipients.filter(r => r.ceremony === ceremonyId && r.category === catName).length;
            if (count > 0) filledCats++;
          });
        });
        return { total: totalCats, filled: filledCats, empty: totalCats - filledCats };
      }, [categories, recipients]);

      const ceremonyRankings = useMemo(() => {
        return CEREMONIES.map(c => {
          const count = stats[c.id] || 0;
          const percentage = c.quota > 0 ? Math.round((count / c.quota) * 100) : 0;
          return { ...c, count, percentage };
        }).sort((a, b) => b.percentage - a.percentage);
      }, [stats]);

      // Advanced Analytics: Top 5 Active Schools / Units
      const topSchools = useMemo(() => {
        const counts = {};
        recipients.forEach(r => {
          const school = r.schoolUnit ? r.schoolUnit.trim().toUpperCase() : '';
          if (school) {
            counts[school] = (counts[school] || 0) + 1;
          }
        });
        return Object.entries(counts)
          .map(([name, count]) => ({ name, count }))
          .sort((a, b) => b.count - a.count)
          .slice(0, 5);
      }, [recipients]);

      // Advanced Analytics: Top PICs / Sectors Leaderboard
      const topSectors = useMemo(() => {
        const counts = {};
        recipients.forEach(r => {
          const pic = r.pic ? r.pic.trim().toUpperCase() : '';
          if (pic) {
            counts[pic] = (counts[pic] || 0) + 1;
          }
        });
        return Object.entries(counts)
          .map(([name, count]) => ({ name, count }))
          .sort((a, b) => b.count - a.count)
          .slice(0, 5);
      }, [recipients]);

      // Advanced Analytics: Primary vs Secondary School Breakdown
      const levelSplit = useMemo(() => {
        let srCount = 0;
        let smCount = 0;
        let otherCount = 0;
        recipients.forEach(r => {
          const cat = r.category || '';
          if (cat.startsWith('SR:')) {
            srCount++;
          } else if (cat.startsWith('SM:')) {
            smCount++;
          } else {
            otherCount++;
          }
        });
        const total = srCount + smCount + otherCount;
        return {
          sr: total > 0 ? Math.round((srCount / total) * 100) : 0,
          sm: total > 0 ? Math.round((smCount / total) * 100) : 0,
          other: total > 0 ? Math.round((otherCount / total) * 100) : 0,
          srCount,
          smCount,
          otherCount
        };

            <div className="flex-1 overflow-auto">
              <table className="min-w-full divide-y divide-slate-200">
                <thead className="bg-slate-800 sticky top-0 z-10 shadow-sm text-white">
                  <tr>
                    <th scope="col" className="px-4 py-3 text-left text-xs font-bold uppercase tracking-wider w-1/4">Award Category</th>
                    <th scope="col" className="px-2 py-3 text-left text-xs font-bold uppercase tracking-wider w-24">Salutation</th>
                    <th scope="col" className="px-2 py-3 text-left text-xs font-bold uppercase tracking-wider">Full Name</th>
                    <th scope="col" className="px-2 py-3 text-left text-xs font-bold uppercase tracking-wider w-36">IC Number</th>
                    <th scope="col" className="px-2 py-3 text-left text-xs font-bold uppercase tracking-wider">School / Unit</th>
                    <th scope="col" className="px-2 py-3 text-left text-xs font-bold uppercase tracking-wider w-24">PIC</th>
                    <th scope="col" className="px-2 py-3 text-center text-xs font-bold uppercase tracking-wider w-16">Act</th>
                  </tr>
                </thead>
                <tbody className="bg-white divide-y divide-slate-200">
                  {categoryOptions.map(category => {
                    const filled = recipients.filter(r => r.category === category);
                    const draft = drafts[category] || {};

                    return (
                      <React.Fragment key={category}>
                        {filled.map((r, i) => (
                          <tr key={r.id} className="bg-emerald-50/40 hover:bg-emerald-50 transition-colors group">
                            <td className="px-4 py-2 text-sm font-semibold text-emerald-800 bg-emerald-100/50 border-r border-slate-200 relative group/cat">
                              {i === 0 ? <div className="flex items-start gap-2 pr-6"><span className="text-emerald-500 mt-0.5">✓</span> <span>{category}</span></div> : ''}
                              {i === 0 && (
                                <button onClick={() => handleDeleteCategory(ceremony.id, category)} className="absolute right-2 top-1/2 -translate-y-1/2 text-emerald-600 hover:text-red-500 opacity-0 group-hover/cat:opacity-100 transition-opacity" title="Padam Kategori">
                                  <Trash2 className="w-4 h-4" />
                                </button>
                              )}
                            </td>
                            <td className="px-2 py-2 text-sm font-medium">{r.salutation}</td>
                            <td className="px-2 py-2 text-sm font-medium uppercase">{r.fullName}</td>
                            <td className="px-2 py-2 text-sm font-mono text-slate-600">{r.icNumber}</td>
                            <td className="px-2 py-2 text-sm text-slate-700">{r.schoolUnit}</td>
                            <td className="px-2 py-2 text-sm text-slate-700 uppercase">{r.pic}</td>
                            <td className="px-2 py-2 text-center">
                              <button onClick={() => handleDelete(r.id)} className="text-red-500 hover:text-red-700 p-1 transition-colors bg-white rounded shadow-sm border border-red-100">
                                <Trash2 className="w-4 h-4" />
                              </button>
                            </td>
                          </tr>
                        ))}
                        
                        <tr className={filled.length === 0 ? "bg-red-50/20" : "bg-white"}>
                          <td className={`px-4 py-2 text-sm border-r border-slate-200 relative group/cat ${filled.length === 0 ? 'font-semibold text-slate-800' : 'text-slate-400 font-normal'}`}>
                            {filled.length === 0 ? (
                              <>
                                <div className="flex items-start gap-2 pr-6"><span className="text-red-400 mt-0.5 opacity-60">○</span> <span>{category}</span></div>
                                <button onClick={() => handleDeleteCategory(ceremony.id, category)} className="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-red-500 opacity-0 group-hover/cat:opacity-100 transition-opacity" title="Padam Kategori">
                                  <Trash2 className="w-4 h-4" />
                                </button>
                              </>
                            ) : (
                              <span className="pl-6 flex items-center gap-1 text-xs text-slate-400"><Plus className="w-3 h-3"/> Add another recipient</span>
                            )}
                          </td>
                          <td className="px-2 py-1 align-top pt-2">
                            <select 
                              value={draft.salutation || 'Encik'} 
                              onChange={(e) => handleDraftChange(category, 'salutation', e.target.value)}
                              className="w-full text-xs border-slate-300 rounded p-1.5 focus:ring-blue-500 focus:border-blue-500 border bg-white shadow-sm"
                            >
                              {SALUTATIONS.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                          </td>
                          <td className="px-2 py-1 align-top pt-2">
                            <input 
                              placeholder="AHMAD BIN ABU" 
                              value={draft.fullName || ''} 
                              onChange={(e) => handleDraftChange(category, 'fullName', e.target.value)}
                              className="w-full text-xs border-slate-300 rounded p-1.5 uppercase focus:ring-blue-500 focus:border-blue-500 border shadow-sm" 
                            />
                          </td>
                          <td className="px-2 py-1 align-top pt-2">
                            <input 
                              placeholder="XXXXXX-XX-XXXX" 
                              value={draft.icNumber || ''} 
                              onChange={(e) => handleDraftChange(category, 'icNumber', e.target.value)}
                              className="w-full text-xs border-slate-300 rounded p-1.5 focus:ring-blue-500 focus:border-blue-500 border shadow-sm font-mono" 
                            />
                          </td>
                          <td className="px-2 py-1 align-top pt-2">
                            <input 
                              placeholder="SMK Seri Bintang" 
                              value={draft.schoolUnit || ''} 
                              onChange={(e) => handleDraftChange(category, 'schoolUnit', e.target.value)}
                              className="w-full text-xs border-slate-300 rounded p-1.5 focus:ring-blue-500 focus:border-blue-500 border shadow-sm" 
                            />
                          </td>
                          <td className="px-2 py-1 align-top pt-2">
                            <input 
                              placeholder="SPS" 
                              value={draft.pic || ''} 
                              onChange={(e) => handleDraftChange(category, 'pic', e.target.value)}
                              className="w-full text-xs border-slate-300 rounded p-1.5 uppercase focus:ring-blue-500 focus:border-blue-500 border shadow-sm" 
                            />
                          </td>
                          <td className="px-2 py-1 text-center align-top pt-2">
                            <button 
                              onClick={() => handleSaveDraft(ceremony.id, category)}
                              className="bg-blue-600 text-white p-1.5 rounded hover:bg-blue-700 transition-colors w-full flex justify-center shadow-sm"
                              title="Save Recipient"
                            >
                              <Plus className="w-4 h-4" />
                            </button>
                          </td>
                        </tr>
                      </React.Fragment>
                    );
                  })}
                  
                  <tr>
                    <td colSpan="7" className="px-4 py-6 text-center bg-slate-50 border-t border-slate-200">
                      <button 
                        onClick={() => handleAddCategory(ceremony.id)}
                        className="inline-flex items-center gap-2 px-4 py-2 bg-white border border-slate-300 text-slate-700 text-sm font-medium rounded-lg hover:bg-slate-100 hover:text-blue-600 transition-colors shadow-sm"
                      >
                        <Plus className="w-4 h-4" />
                        Tambah Kategori Baharu
                      </button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-100 font-sans text-slate-900 flex flex-col md:flex-row">
          
          {/* Mobile Top Header (Sticky) */}
          <div className="md:hidden bg-slate-900 text-white flex items-center justify-between px-6 h-16 sticky top-0 z-30 shadow-md">
            <div className="flex items-center gap-3">
              <Award className="w-8 h-8 text-blue-400 animate-pulse" />
              <div className="flex flex-col">
                <span className="font-bold text-lg tracking-wide leading-none">MAHKOTA 2026</span>
                <span className="text-[10px] text-slate-400">PPD RANAU</span>
              </div>
            </div>
            <button 
              onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
              className="p-2 text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-colors focus:outline-none"
            >
              {isMobileMenuOpen ? <X className="w-6 h-6" /> : <Menu className="w-6 h-6" />}
            </button>
          </div>

          {/* Backdrop overlay for mobile menu drawer */}
          {isMobileMenuOpen && (
            <div 
              onClick={() => setIsMobileMenuOpen(false)}
              className="fixed inset-0 z-30 bg-black/60 backdrop-blur-xs md:hidden transition-opacity duration-300"
            />
          )}

          {/* Fixed Left Sidebar Menu */}
          <aside className={`fixed inset-y-0 left-0 z-40 w-64 bg-slate-900 text-white transform transition-transform duration-300 ease-in-out md:translate-x-0 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} flex flex-col border-r border-slate-800`}>
            {/* Branding */}
            <div className="p-6 border-b border-slate-800 flex flex-col gap-3 shrink-0">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <Award className="w-8 h-8 text-blue-400" />
                  <div className="flex flex-col">
                    <span className="font-extrabold text-xl tracking-wide leading-tight">MAHKOTA 2026</span>
                    <span className="text-[11px] text-slate-400 font-semibold tracking-widest uppercase">PPD RANAU</span>
                  </div>
                </div>
                <button 
                  onClick={() => setIsMobileMenuOpen(false)}
                  className="md:hidden p-1.5 text-slate-400 hover:text-white hover:bg-slate-800 rounded-md"
                >
                  <X className="w-5 h-5" />
                </button>
              </div>

              {/* Real-time Connection Cloud banner */}
              <div className="flex items-center gap-2 px-3 py-1.5 bg-slate-800/60 rounded-lg border border-slate-800 text-xs">
                <Cloud className={`w-4 h-4 ${syncStatus === 'Live' ? 'text-emerald-400' : syncStatus === 'Syncing...' ? 'text-amber-400 animate-spin' : 'text-slate-400'}`} />
                <span className="font-semibold text-slate-300">Database:</span>
                <span className={`font-bold ${syncStatus === 'Live' ? 'text-emerald-400' : 'text-slate-400'}`}>{syncStatus}</span>
              </div>
            </div>

            {/* Navigation links */}
            <nav className="flex-1 px-4 py-6 space-y-2 overflow-y-auto hide-scrollbar">
              <button
                onClick={() => { setActiveTab('dashboard'); setIsMobileMenuOpen(false); }}
                className={`w-full px-4 py-3 rounded-xl text-sm font-semibold transition-all flex items-center gap-3.5 ${
                  activeTab === 'dashboard' ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/30' : 'text-slate-300 hover:bg-slate-800/80 hover:text-white'
                }`}
              >
                <LayoutDashboard className="w-5 h-5 shrink-0" />
                <span>Dashboard</span>
              </button>
              
              <div className="pt-6 pb-2 text-[10px] font-bold uppercase tracking-widest text-slate-500 px-4">
                Ceremonies / Roster
              </div>

              {CEREMONIES.map(ceremony => (
                <button
                  key={ceremony.id}
                  onClick={() => { setActiveTab(ceremony.id); setIsMobileMenuOpen(false); }}
                  className={`w-full px-4 py-3 rounded-xl text-sm font-semibold transition-all flex items-center justify-between group ${
                    activeTab === ceremony.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/30' : 'text-slate-300 hover:bg-slate-800/80 hover:text-white'
                  }`}
                >
                  <div className="flex items-center gap-3.5 font-sans">
                    <span className={activeTab === ceremony.id ? 'text-white' : 'text-slate-400 group-hover:text-white transition-colors'}>
                      {ceremony.icon}
                    </span>
                    <span>{ceremony.name}</span>
                  </div>
                  <span className={`text-xs px-2.5 py-0.5 rounded-full font-bold ${
                    activeTab === ceremony.id ? 'bg-blue-700 text-blue-100' : 'bg-slate-800 text-slate-400'
                  }`}>
                    {stats[ceremony.id]}/{ceremony.quota}
                  </span>
                </button>
              ))}
            </nav>

            <div className="p-4 border-t border-slate-800 text-center text-xs text-slate-500 shrink-0">
              &copy; 2026 MAHKOTA.<br/>Developed by ShellYap.
            </div>
          </aside>

          {/* Main Content Box Wrapper */}
          <div className="flex-1 flex flex-col min-h-screen md:pl-64">
            <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-1 w-full">
              {activeTab === 'dashboard' ? renderDashboard() : renderDataSheet(CEREMONIES.find(c => c.id === activeTab))}
            </main>
            
            <footer className="w-full text-center pb-8 pt-2 text-xs text-slate-400 font-medium md:hidden">
              &copy; 2026 MAHKOTA. Developed by ShellYap.
            </footer>
          </div>

          {/* Dialog Modals */}
          {modal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-xs p-4">
              <div className="bg-white rounded-xl shadow-xl w-full max-w-sm p-6 animate-fade-in border border-slate-100">
                <h3 className="text-lg font-bold text-slate-800 mb-2">{modal.title}</h3>
                <p className="text-slate-600 text-sm mb-4 leading-relaxed">{modal.message}</p>
                
                {modal.type === 'prompt' && (
                  <input 
                    type="text" 
                    autoFocus
                    className="w-full mb-6 border-slate-300 rounded-lg p-2.5 focus:ring-blue-500 focus:border-blue-500 border shadow-xs"
                    placeholder="Nama kategori..."
                    value={modal.inputValue}
                    onChange={(e) => setModal({ ...modal, inputValue: e.target.value })}
                    onKeyDown={(e) => {
                      if (e.key === 'Enter') {
                        if (modal.onConfirm) modal.onConfirm(modal.inputValue);
                        setModal({ ...modal, isOpen: false });
                      }
                    }}
                  />
                )}
                
                <div className="flex justify-end gap-3 mt-2">
                  {(modal.type === 'confirm' || modal.type === 'prompt') && (
                    <button 
                      onClick={() => setModal({ ...modal, isOpen: false })}
                      className="px-4 py-2 text-slate-600 font-medium hover:bg-slate-100 rounded-lg transition-colors text-sm"
                    >
                      Batal
                    </button>
                  )}
                  <button 
                    onClick={() => {
                      if (modal.onConfirm) {
                        modal.type === 'prompt' ? modal.onConfirm(modal.inputValue) : modal.onConfirm();
                      }
                      setModal({ ...modal, isOpen: false });
                    }}
                    className="px-4 py-2 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition-colors text-sm shadow-xs"
                  >
                    {modal.type === 'alert' ? 'OK' : 'Simpan / Teruskan'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
