          "Wakil Komuniti / Rakan Strategik": 0

          const category = f.kategoriHadirin || '';
          if (counts[category] !== undefined) {
            counts[category]++;
          }
        });

        const total = Object.values(counts).reduce((acc, curr) => acc + curr, 0);

            name,
            count,
            percentage: total > 0 ? Math.round((count / total) * 100) : 0

          return { ...c, count, percentage };

      }, [stats]);

      // Advanced Analytics: Top 5 Active Schools / Units
      const topSchools = useMemo(() => {
        const counts = {};
        recipients.forEach(r => {
          const school = r.schoolUnit ? r.schoolUnit.trim().toUpperCase() : '';
          if (school) {
            counts[school] = (counts[school] || 0) + 1;
          }
        });
        return Object.entries(counts)
          .map(([name, count]) => ({ name, count }))
          .sort((a, b) => b.count - a.count)
          .slice(0, 5);
      }, [recipients]);

      // Advanced Analytics: Top PICs / Sectors Leaderboard
      const topSectors = useMemo(() => {
        const counts = {};
        recipients.forEach(r => {
          const pic = r.pic ? r.pic.trim().toUpperCase() : '';
          if (pic) {
            counts[pic] = (counts[pic] || 0) + 1;
          }
        });
        return Object.entries(counts)
          .map(([name, count]) => ({ name, count }))
          .sort((a, b) => b.count - a.count)
          .slice(0, 5);
      }, [recipients]);

      // Advanced Analytics: Primary vs Secondary School Breakdown
      const levelSplit = useMemo(() => {
        let srCount = 0;
        let smCount = 0;
        let otherCount = 0;
        recipients.forEach(r => {
          const cat = r.category || '';
          if (cat.startsWith('SR:')) {
            srCount++;
          } else if (cat.startsWith('SM:')) {
            smCount++;
          } else {
            otherCount++;
          }
        });
        const total = srCount + smCount + otherCount;
        return {
          sr: total > 0 ? Math.round((srCount / total) * 100) : 0,
          sm: total > 0 ? Math.round((smCount / total) * 100) : 0,
          other: total > 0 ? Math.round((otherCount / total) * 100) : 0,
          srCount,
          smCount,
          otherCount
        };
      }, [recipients]);

      // Advanced Analytics: Salutations Demographics Profile
      const salutationProfile = useMemo(() => {
        let male = 0; // Encik, Tuan, Ustaz, Datuk
        let female = 0; // Puan, Cik, Ustazah, Datin, Puan Sri
        let spec = 0; // Dr., Tan Sri etc.
        recipients.forEach(r => {
          const s = r.salutation || '';
          if (['Encik', 'Tuan', 'Ustaz', 'Datuk'].includes(s)) male++;
          else if (['Puan', 'Cik', 'Ustazah', 'Datin', 'Puan Sri'].includes(s)) female++;
          else spec++;
        });
        const total = male + female + spec;
        return {
          male: total > 0 ? Math.round((male / total) * 100) : 0,
          female: total > 0 ? Math.round((female / total) * 100) : 0,
          spec: total > 0 ? Math.round((spec / total) * 100) : 0,
          maleCount: male,
          femaleCount: female,
          specCount: spec
        };
      }, [recipients]);

      // SVG Donut Chart Segment Calculations
      const donutSegments = useMemo(() => {
        const totalRecipients = recipients.length;
        if (totalRecipients === 0) return [];
        let accumulatedPercent = 0;
        
        const colors = {
          mapens: '#f59e0b', // Amber-500
          apc: '#3b82f6',    // Blue-500
          mekar: '#10b981',  // Emerald-500
          makmur: '#8b5cf6'  // Purple-500
        };

        return CEREMONIES.map(c => {
          const count = stats[c.id] || 0;
          const pct = count / totalRecipients;
          const strokeLength = pct * 251.2; 
          const strokeOffset = 251.2 - (accumulatedPercent * 251.2);
          accumulatedPercent += pct;
          return {
            id: c.id,
            name: c.name,
            count,
            percentage: Math.round(pct * 100),
            color: colors[c.id],
            strokeDasharray: `${strokeLength} ${251.2 - strokeLength}`,
            strokeDashoffset: strokeOffset
          };
        });
      }, [stats, recipients]);

      const activeReminders = useMemo(() => {
        const list = [];
        
        CEREMONIES.forEach(c => {
          const currentCount = stats[c.id] || 0;
          const ratio = currentCount / c.quota;
          if (ratio >= 0.9 && ratio < 1) {
            list.push({
              id: `warn-${c.id}`,
              type: 'warning',
              text: `Majlis ${c.name} hampir mencapai kuota! (${currentCount}/${c.quota} slots diisi).`
            });
          } else if (currentCount > c.quota) {
            list.push({
              id: `crit-${c.id}`,
              type: 'critical',
              text: `Majlis ${c.name} telah melebihi had kuota maksimum! (${currentCount}/${c.quota}).`
            });
          }
        });

        const totalCats = Object.keys(categories).reduce((sum, key) => sum + categories[key].length, 0);
        const filledCats = Object.keys(categories).reduce((sum, key) => {
          return sum + categories[key].filter(cat => recipients.some(r => r.category === cat)).length;
        }, 0);
        const emptyCatsCount = totalCats - filledCats;

        if (emptyCatsCount > 0) {
          list.push({
            id: 'empty-categories',
            type: 'info',
            text: `Terdapat ${emptyCatsCount} kategori anugerah yang masih kosong tanpa sebarang pencalonan.`
          });
        }

        const formatViolators = recipients.filter(r => {
          const normalized = r.icNumber.replace(/[^0-9]/g, '');
          return normalized.length !== 12;
        });
        if (formatViolators.length > 0) {
          list.push({
            id: 'ic-check',
            type: 'warning',
            text: `Kesan ${formatViolators.length} format No. Kad Pengenalan tidak mengikut format piawai 12-digit.`
          });
        }

        if (list.length === 0) {
          list.push({
            id: 'ok-status',
            type: 'success',
            text: 'Semua kemasukan data berada dalam keadaan teratur. Sedia untuk dieksport.'
          });
        }

        return list;
      }, [stats, categories, recipients]);

      const recentRecipients = useMemo(() => {
        return [...recipients]
          .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0))
          .slice(0, 5);
      }, [recipients]);

      // FEEDBACK MULTI-DIMENSIONAL STATISTICS COMPUTATIONS
      const feedbackStats = useMemo(() => {
        const total = activeFeedbacks.length;
        if (total === 0) {
          return {
            total: 0,
            overallAverage: 0,
            logistikAvg: 0,
            protokolAvg: 0,
            pengisianAvg: 0,
            questionBreakdown: {}
          };
        }

        const defaultBreakdown = {
          logistik_pendaftaran: { key: 'logistik', subKey: 'pendaftaran', label: 'Urusan Pendaftaran', scores: [0,0,0,0,0], sum: 0, count: 0 },
          logistik_kemudahan: { key: 'logistik', subKey: 'kemudahan', label: 'Kemudahan & Tempat Dewan', scores: [0,0,0,0,0], sum: 0, count: 0 },
          logistik_siaraya: { key: 'logistik', subKey: 'siaraya', label: 'Sistem Siaraya / Publisiti', scores: [0,0,0,0,0], sum: 0, count: 0 },
          logistik_makanan: { key: 'logistik', subKey: 'makanan', label: 'Kualiti Makanan & Jamuan', scores: [0,0,0,0,0], sum: 0, count: 0 },
          protokol_masa: { key: 'protokol', subKey: 'masa', label: 'Ketepatan Masa Tentatif', scores: [0,0,0,0,0], sum: 0, count: 0 },
          protokol_aliran: { key: 'protokol', subKey: 'aliran', label: 'Aliran Kelancaran Majlis', scores: [0,0,0,0,0], sum: 0, count: 0 },
          protokol_emcee: { key: 'protokol', subKey: 'emcee', label: 'Gaya Urus Setia & Pengacaraan', scores: [0,0,0,0,0], sum: 0, count: 0 },
          pengisian_relevansi: { key: 'pengisian', subKey: 'relevansi', label: 'Relevansi Kategori Anugerah', scores: [0,0,0,0,0], sum: 0, count: 0 },
          pengisian_impak: { key: 'pengisian', subKey: 'impak', label: 'Impak & Nilai Penghargaan', scores: [0,0,0,0,0], sum: 0, count: 0 },
        };

        let logistikSum = 0, logistikCount = 0;
        let protokolSum = 0, protokolCount = 0;
        let pengisianSum = 0, pengisianCount = 0;

        activeFeedbacks.forEach(f => {
          // Process Logistik
          if (f.logistik) {
            const keys = ['pendaftaran', 'kemudahan', 'siaraya', 'makanan'];
            keys.forEach(k => {
              const val = parseInt(f.logistik[k]);
              if (!isNaN(val) && val >= 1 && val <= 5) {
                const breakdownKey = `logistik_${k}`;
                defaultBreakdown[breakdownKey].scores[val - 1]++;
                defaultBreakdown[breakdownKey].sum += val;
                defaultBreakdown[breakdownKey].count++;
                logistikSum += val;
                logistikCount++;
              }
            });
          }
          // Process Protokol
          if (f.protokol) {
            const keys = ['masa', 'aliran', 'emcee'];
            keys.forEach(k => {
              const val = parseInt(f.protokol[k]);
              if (!isNaN(val) && val >= 1 && val <= 5) {
                const breakdownKey = `protokol_${k}`;
                defaultBreakdown[breakdownKey].scores[val - 1]++;
                defaultBreakdown[breakdownKey].sum += val;
                defaultBreakdown[breakdownKey].count++;
                protokolSum += val;
                protokolCount++;
              }
            });
          }
          // Process Pengisian
          if (f.pengisian) {
            const keys = ['relevansi', 'impak'];
            keys.forEach(k => {
              const val = parseInt(f.pengisian[k]);
              if (!isNaN(val) && val >= 1 && val <= 5) {
                const breakdownKey = `pengisian_${k}`;
                defaultBreakdown[breakdownKey].scores[val - 1]++;
                defaultBreakdown[breakdownKey].sum += val;
                defaultBreakdown[breakdownKey].count++;
                pengisianSum += val;
                pengisianCount++;
              }
            });
          }
        });

        const overallSum = logistikSum + protokolSum + pengisianSum;
        const overallCount = logistikCount + protokolCount + pengisianCount;

        return {
          total,
          overallAverage: overallCount > 0 ? (overallSum / overallCount).toFixed(2) : 0,
          logistikAvg: logistikCount > 0 ? (logistikSum / logistikCount).toFixed(2) : 0,
          protokolAvg: protokolCount > 0 ? (protokolSum / protokolCount).toFixed(2) : 0,
          pengisianAvg: pengisianCount > 0 ? (pengisianSum / pengisianCount).toFixed(2) : 0,
          questionBreakdown: defaultBreakdown
        };
      }, [activeFeedbacks]);

      // Search strength and improvement items separately in Papan Cadangan
      const filteredComments = useMemo(() => {
        return activeFeedbacks.filter(f => {
          const query = searchFeedbackQuery.toLowerCase();
          const matchesKekuatan = f.kekuatan ? f.kekuatan.toLowerCase().includes(query) : false;
          const matchesPenambahbaikan = f.penambahbaikan ? f.penambahbaikan.toLowerCase().includes(query) : false;
          return matchesKekuatan || matchesPenambahbaikan;
        });
      }, [activeFeedbacks, searchFeedbackQuery]);

      const handleDraftChange = (category, field, value) => {
        setDrafts(prev => ({
          ...prev,
          [category]: {
            ...(prev[category] || { salutation: 'Encik', fullName: '', icNumber: '', schoolUnit: '', pic: '' }),
            [field]: value
          }
        }));
      };

      const handleSaveDraft = (ceremonyId, category) => {
        const draft = drafts[category];
        if (!draft || !draft.fullName || !draft.icNumber || !draft.schoolUnit || !draft.pic) {
          showAlert("Maklumat Tidak Lengkap", "Sila isi semua ruangan (Nama, No. KP, Sekolah, PIC).");
          return;
        }
        
        const proceedWithSave = async () => {
          const newId = Date.now().toString();
          const newRecipient = {
            id: newId,
            ceremony: ceremonyId,
            category: category,
            salutation: draft.salutation || 'Encik',
            fullName: draft.fullName,
            icNumber: draft.icNumber,
            schoolUnit: draft.schoolUnit,
            pic: draft.pic,
            createdAt: Date.now(),
            createdBy: user?.uid || 'unknown'
          };

          try {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'recipients', newId);
            await setDoc(docRef, newRecipient);

            setDrafts(prev => ({
              ...prev,
              [category]: {
                salutation: draft.salutation || 'Encik',
                fullName: '',
                icNumber: '',
                schoolUnit: '',
                pic: draft.pic
              }
            }));
          } catch (err) {
            console.error("Error saving data:", err);
            showAlert("Ralat", "Gagal menyimpan data. Sila semak sambungan internet anda.");
          }
        };

        const currentCount = stats[ceremonyId] || 0;
        const quota = CEREMONIES.find(c => c.id === ceremonyId).quota;
        
        if (currentCount >= quota) {
          showConfirm(
            "Amaran Kuota Penuh", 
            `Anda telah mencapai had kuota (${quota}) untuk majlis ini. Tambah juga?`, 
            proceedWithSave
          );
        } else {
          proceedWithSave();
        }
      };

      const handleDelete = (id) => {
        showConfirm("Padam Rekod", "Adakah anda pasti mahu memadam rekod ini?", async () => {
          try {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'recipients', id);
            await deleteDoc(docRef);
          } catch (err) {
            console.error("Error deleting data:", err);
            showAlert("Ralat", "Gagal memadam rekod.");
          }
        });
      };

      const handleAddCategoryConfig = (ceremonyId) => {
        showPrompt("Tambah Kategori Baharu", "Sila masukkan nama kategori anugerah baharu:", async (newCategory) => {
          if (!newCategory || newCategory.trim() === '') return;
          
          const updatedCategories = {
            ...categories,
            [ceremonyId]: [...(categories[ceremonyId] || []), newCategory.trim()]
          };

          try {
            const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'categories_config');
            await setDoc(configRef, { categories: updatedCategories });
          } catch (err) {
            console.error("Error adding category:", err);
            showAlert("Ralat", "Gagal menyimpan kategori baharu.");
          }
        });
      };

      const handleDeleteCategoryConfig = (ceremonyId, categoryName) => {
        const hasRecipients = recipients.some(r => r.ceremony === ceremonyId && r.category === categoryName);
        
        if (hasRecipients) {
          showAlert("Tindakan Dihalang", "Kategori ini mempunyai rekod penerima. Sila padam rekod penerima terlebih dahulu sebelum memadam kategori.");
          return;
        }

        showConfirm("Padam Kategori", `Adakah anda pasti mahu memadam kategori "${categoryName}" secara kekal?`, async () => {
          const updatedCategories = {
            ...categories,
            [ceremonyId]: (categories[ceremonyId] || []).filter(c => c !== categoryName)
          };

          try {
            const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'categories_config');
            await setDoc(configRef, { categories: updatedCategories });
          } catch (err) {
            console.error("Error deleting category:", err);
            showAlert("Ralat", "Gagal memadam kategori.");
          }
        });
      };

      const exportToCSV = (ceremonyId) => {
        const filtered = ceremonyId === 'all' 
          ? recipients 
          : recipients.filter(r => r.ceremony === ceremonyId);
        
        if (filtered.length === 0) {
          showAlert("Tiada Data", "Tiada rekod setakat ini untuk dieksport.");
          return;
        }

        const headers = ['No.', 'Salutation', 'Full Name (IC)', 'IC Number', 'Name of School / Unit', 'Award Category', 'Ceremony', 'PIC / Sector'];
        
        const rows = filtered.map((r, index) => [
          index + 1,
          `"${r.salutation}"`,
          `"${r.fullName}"`,
          `"${r.icNumber}"`,
          `"${r.schoolUnit}"`,
          `"${r.category}"`,
          `"${CEREMONIES.find(c => c.id === r.ceremony)?.name || r.ceremony}"`,
          `"${r.pic}"`
        ]);

        const csvContent = [headers.join(','), ...rows.map(e => e.join(','))].join('\n');
        
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `Recipients_${ceremonyId === 'all' ? 'All' : ceremonyId.toUpperCase()}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      // 👈 FUNGSI PEMBERSIHAN KATA LALUAN TERBAIK (DIJALANKAN DARI CLIENT YANG LOG MASUK SECARA ANONYMOUS)
      const handleResetFeedbackDb = () => {
        showPrompt(
          "PENGESAHAN PEMILIK: Set Semula Data Maklum Balas", 
          "Sila masukkan kata laluan pemilik untuk mengosongkan pangkalan data maklum balas secara kekal di server Firebase:", 
          async (inputPassword) => {
            if (!inputPassword) return;
            // 🔒 Kata laluan disetkan kepada ppdranau2026
            if (inputPassword === 'ppdranau2026') {
              showConfirm(
                "Sila Sahkan Tindakan Anda", 
                "Adakah anda benar-benar pasti? Tindakan ini akan memadam keseluruhan rekod maklum balas secara kekal di pelayan awan.", 
                async () => {
                  try {
                    setSyncStatus('Clearing...');
                    
                    // 🎯 DAPATKAN SEMUA DOKUMEN DALAM FIRESTORE TERUS (MEMINTAS PENAPIS UI)
                    // Ini memastikan dokumen hantu (ghost) atau rosak yang disembunyikan oleh React tetap dikesan dan dimusnahkan.
                    const feedbackColRef = collection(db, 'artifacts', appId, 'public', 'data', 'feedback');
                    const querySnapshot = await getDocs(feedbackColRef);
                    
                    const deletePromises = [];
                    querySnapshot.forEach((document) => {
                      const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'feedback', document.id);
                      deletePromises.push(deleteDoc(docRef));
                    });
                    
                    await Promise.all(deletePromises);
                    
                    // ⚠️ Secara automatik matikan mod simulasi supaya mereka melihat status sifar (0) yang bersih serta-merta!
                    setUseSimulationData(false);
                    showAlert("Berjaya", "Pangkalan data di awan Firebase telah dibersihkan sepenuhnya kepada 0!");
                  } catch (err) {
                    console.error("Error purging database client-side:", err);
                    showAlert("Ralat", "Gagal memadam dokumen. Sila semak Firestore Security Rules anda.");
                  } finally {
                    setSyncStatus('Live');
                  }
                }
              );
            } else {
              showAlert("Akses Dihalang", "Kata laluan yang anda masukkan adalah salah!");
            }
          }
        );
      };

      const renderDashboard = () => {
        const overallTotalRecipients = recipients.length;
        const totalCatsCount = Object.keys(categories).reduce((sum, key) => sum + categories[key].length, 0);
        const filledCatsCount = Object.keys(categories).reduce((sum, key) => {
          return sum + categories[key].filter(cat => recipients.some(r => r.category === cat)).length;
        }, 0);
        const emptyCatsCount = totalCatsCount - filledCatsCount;

        return (
          <div className="space-y-6 animate-fade-in">

              <div>

              </div>

              >
                <Download className="w-4 h-4"/>
                Eksport Senarai Induk (CSV)
              </button>
            </div>

            {/* Row 1: Primary KPI Bento Blocks */}
            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
              {/* Bento Block 1: Quota Progress Tracker */}
              <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-between min-h-[340px]">
                <div className="flex items-center justify-between">
                  <span className="text-sm font-bold text-slate-400 uppercase tracking-wider">Ringkasan Pengisian</span>
                  <span className="p-2 bg-slate-100 rounded-lg text-slate-600"><TrendingUp className="w-5 h-5"/></span>
                </div>
                
                <div className="my-auto space-y-6">
                  <div>
                    <span className="text-5xl font-black text-slate-800 tracking-tight">{overallTotalRecipients}</span>
                    <span className="text-slate-400 text-lg font-medium"> / {totalQuota}</span>
                    <p className="text-xs text-slate-500 font-medium mt-1 font-sans">Jumlah calon terdaftar mengikut quota siling</p>
                  </div>

                  <div className="space-y-2">
                    <div className="flex justify-between text-sm font-bold text-slate-700">
                      <span>Kuota Siling Terisi</span>
                      <span>{overallFillRate}%</span>
                    </div>
                    <div className="w-full bg-slate-100 rounded-full h-3">
                      <div 
                        className="bg-blue-600 h-3 rounded-full transition-all duration-500" 
                        style={{ width: `${overallFillRate}%` }}
                      />
                    </div>
                  </div>
                </div>

                <div className="pt-4 border-t border-slate-100 grid grid-cols-2 gap-4 text-center">
                  <div>
                    <span className="block text-lg font-bold text-emerald-600">{filledCatsCount}</span>
                    <span className="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">Kategori Terisi</span>
                  </div>
                  <div className="border-l border-slate-100">
                    <span className="block text-lg font-bold text-amber-500">{emptyCatsCount}</span>
                    <span className="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">Kategori Kosong</span>
                  </div>
                </div>
              </div>

              {/* Bento Block 2: Pie Donut Chart Segments */}
              <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col min-h-[340px]">
                <div className="flex items-center justify-between mb-2">
                  <span className="text-sm font-bold text-slate-400 uppercase tracking-wider">Taburan Calon Mengikut Roster</span>
                  <span className="p-2 bg-slate-100 rounded-lg text-slate-600"><PieIcon className="w-5 h-5"/></span>
                </div>

                {overallTotalRecipients === 0 ? (
                  <div className="flex-1 flex flex-col items-center justify-center text-center p-6">
                    <div className="w-20 h-20 rounded-full border-4 border-dashed border-slate-200 flex items-center justify-center text-slate-300">
                      <PieIcon className="w-8 h-8 animate-pulse"/>
                    </div>
                    <p className="text-sm text-slate-400 font-medium mt-3">Sila daftarkan calon untuk melihat agihan.</p>
                  </div>
                ) : (
                  <div className="flex-1 flex items-center justify-center gap-6">
                    {/* SVG Chart ring */}
                    <div className="relative w-36 h-36 shrink-0">
                      <svg className="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" fill="transparent" stroke="#f1f5f9" strokeWidth="10" />
                        {donutSegments.map((segment) => (

                          />
                        ))}
                      </svg>
                      <div className="absolute inset-0 flex flex-col items-center justify-center">

                      </div>
                    </div>

                    {/* Legends */}
                    <div className="space-y-2 flex-1 min-w-0">

              >
                <MessageSquare className="w-5 h-5 shrink-0" />
                <span>Maklum Balas</span>
              </button>
              
              <div className="pt-6 pb-2 text-[10px] font-bold uppercase tracking-widest text-slate-500 px-4">
                Ceremonies / Roster
              </div>

              {CEREMONIES.map(ceremony => (
                <button
                  key={ceremony.id}
                  onClick={() => { setActiveTab(ceremony.id); setIsMobileMenuOpen(false); }}
                  className={`w-full px-4 py-3 rounded-xl text-sm font-semibold transition-all flex items-center justify-between group ${
                    activeTab === ceremony.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/30' : 'text-slate-300 hover:bg-slate-800/80 hover:text-white'
                  }`}
                >
                  <div className="flex items-center gap-3.5 font-sans">
                    <span className={activeTab === ceremony.id ? 'text-white' : 'text-slate-400 group-hover:text-white transition-colors'}>
                      {ceremony.icon}
                    </span>
                    <span>{ceremony.name}</span>
                  </div>
                  <span className={`text-xs px-2.5 py-0.5 rounded-full font-bold ${
                    activeTab === ceremony.id ? 'bg-blue-700 text-blue-100' : 'bg-slate-800 text-slate-400'
                  }`}>
                    {stats[ceremony.id]}/{ceremony.quota}
                  </span>
                </button>
              ))}
            </nav>

            <div className="p-4 border-t border-slate-800 text-center text-xs text-slate-500 shrink-0">
              &copy; 2026 MAHKOTA.<br/>Developed by ShellYap.
            </div>
          </aside>

          {/* Main Content Box Wrapper */}
          <div className="flex-1 flex flex-col min-h-screen md:pl-64">
            <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-1 w-full">
              {activeTab === 'dashboard' ? (
                renderDashboard()
              ) : activeTab === 'feedback_analysis' ? (
                renderFeedbackAnalysis()
              ) : (
                renderDataSheet(CEREMONIES.find(c => c.id === activeTab))
              )}
            </main>
            
            <footer className="w-full text-center pb-8 pt-2 text-xs text-slate-400 font-medium md:hidden">
              &copy; 2026 MAHKOTA. Developed by ShellYap.
            </footer>
          </div>

          {/* Dialog Modals */}
          {modal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-xs p-4">
              <div className="bg-white rounded-xl shadow-xl w-full max-w-sm p-6 animate-fade-in border border-slate-100">
                <h3 className="text-lg font-bold text-slate-800 mb-2">{modal.title}</h3>
                <p className="text-slate-600 text-sm mb-4 leading-relaxed">{modal.message}</p>
                
                {modal.type === 'prompt' && (
                  <input 
                    type="text" 
                    autoFocus
                    className="w-full mb-6 border-slate-300 rounded-lg p-2.5 focus:ring-blue-500 focus:border-blue-500 border shadow-xs"
                    placeholder="Nama kategori..."
                    value={modal.inputValue}
                    onChange={(e) => setModal({ ...modal, inputValue: e.target.value })}
                    onKeyDown={(e) => {
                      if (e.key === 'Enter') {
                        if (modal.onConfirm) modal.onConfirm(modal.inputValue);
                        setModal({ ...modal, isOpen: false });
                      }
                    }}
                  />
                )}
                
                <div className="flex justify-end gap-3 mt-2">
                  {(modal.type === 'confirm' || modal.type === 'prompt') && (
                    <button 
                      onClick={() => setModal({ ...modal, isOpen: false })}
                      className="px-4 py-2 text-slate-600 font-medium hover:bg-slate-100 rounded-lg transition-colors text-sm"
                    >
                      Batal
                    </button>
                  )}
                  <button 
                    onClick={() => {
                      if (modal.onConfirm) {
                        modal.type === 'prompt' ? modal.onConfirm(modal.inputValue) : modal.onConfirm();
                      }
                      setModal({ ...modal, isOpen: false });
                    }}
                    className="px-4 py-2 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition-colors text-sm shadow-xs"
                  >
                    {modal.type === 'alert' ? 'OK' : 'Simpan / Teruskan'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
