<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Progress Tracker</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel for In-Browser JSX/TSX Compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Import Map for Modules - FIXED FIREBASE IMPORTS -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js",
        "lucide-react": "https://esm.sh/lucide-react@0.303.0"
      }
    }
    </script>

    <style>
        /* Custom scrollbar for better UX */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        body {
            background-color: #f3f4f6;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react,typescript">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { 
          getAuth, 
          signInAnonymously, 
          onAuthStateChanged,
          signInWithCustomToken
        } from 'firebase/auth';
        import { 
          getFirestore, 
          collection, 
          addDoc, 
          onSnapshot, 
          deleteDoc, 
          doc, 
          updateDoc, 
          setDoc,
          query,
          where,
          writeBatch,
          getDocs
        } from 'firebase/firestore';
        import { 
          TrendingUp, 
          Plus, 
          Trash2, 
          ChevronRight, 
          FileText, 
          Search,
          Download,
          Edit3,
          ArrowLeft,
          Grid,
          BarChart2,
          Users,
          PieChart,
          Trophy,
          Award,
          Layers,
          Upload,
          FileSpreadsheet,
          Settings,
          X,
          Filter,
          CheckSquare,
          Square,
          School,
          LogOut,
          Shield,
          Target,
          Printer,
          ClipboardList,
          AlertTriangle,
          Lightbulb,
          Calculator,
          ArrowRightLeft,
          Cloud,
          Wifi
        } from 'lucide-react';

        // --- 1. FIREBASE INIT (SINGLETON PATTERN) ---

        const initFirebase = () => {
          let authInstance = null;
          let dbInstance = null;
          let appIdInstance = 'english-tracker-production-v1'; 

          const userConfig = {
            apiKey: "AIzaSyBYqhcV2903lEMKVTzNF5T2Hb1lRorMp3o",
            authDomain: "read-c18f6.firebaseapp.com",
            projectId: "read-c18f6",
            storageBucket: "read-c18f6.firebasestorage.app",
            messagingSenderId: "755609414492",
            appId: "1:755609414492:web:4728c5725bc291246a6f99",
            measurementId: "G-W6WME9XX5K"
          };

          try {
            // Check for environment config
            if (typeof window.__firebase_config !== 'undefined') {
              const firebaseConfig = JSON.parse(window.__firebase_config);
              const app = initializeApp(firebaseConfig);
              authInstance = getAuth(app);
              dbInstance = getFirestore(app);
              if (typeof window.__app_id !== 'undefined') {
                 appIdInstance = window.__app_id;
              }
            } else {
              const app = initializeApp(userConfig);
              authInstance = getAuth(app);
              dbInstance = getFirestore(app);
            }
          } catch (e) {
            console.error("Firebase init failed:", e);
          }
          return { auth: authInstance, db: dbInstance, appId: appIdInstance };
        };

        const { auth: globalAuth, db: globalDb, appId: globalAppId } = initFirebase();

        // --- 2. CONFIGURATION ---

        const ASSESSMENT_CONFIG = {
          tov: { type: 'single', max: 100 },
          int1: { type: 'paper', max: 155 },
          int2: { type: 'paper', max: 155 },
          ppsa: { type: 'paper', max: 155 },
          int3: { type: 'paper', max: 155 },
          spmc: { type: 'paper', max: 155 },
          spm: { type: 'single', max: 100 },
        };

        const ASSESSMENTS = [
          { id: 'tov', label: 'TOV', sub: 'Baseline' },
          { id: 'int1', label: 'Int 1', sub: 'March' },
          { id: 'int2', label: 'Int 2', sub: 'April' },
          { id: 'ppsa', label: 'PPSA', sub: 'May' },
          { id: 'int3', label: 'Int 3', sub: 'July' },
          { id: 'spmc', label: 'SPMC', sub: 'August' },
          { id: 'spm', label: 'SPM', sub: 'Actual' },
        ];

        const PAPERS = [
          { id: 'p1', label: 'Paper 1', skill: 'Reading', max: 40 },
          { id: 'p2', label: 'Paper 2', skill: 'Writing', max: 60 },
          { id: 'p3', label: 'Paper 3', skill: 'Speaking', max: 25 },
          { id: 'p4', label: 'Paper 4', skill: 'Listening', max: 30 },
        ];

        const GRADE_THRESHOLDS = [
          { min: 90, grade: 'A+', val: 0, color: '#22c55e', desc: 'Cemerlang Tertinggi' },
          { min: 80, grade: 'A',  val: 1, color: '#4ade80', desc: 'Cemerlang Tinggi' },
          { min: 70, grade: 'A-', val: 2, color: '#86efac', desc: 'Cemerlang' },
          { min: 65, grade: 'B+', val: 3, color: '#3b82f6', desc: 'Kepujian Tertinggi' },
          { min: 60, grade: 'B',  val: 4, color: '#60a5fa', desc: 'Kepujian Tinggi' },
          { min: 55, grade: 'C+', val: 5, color: '#eab308', desc: 'Kepujian Atas' },
          { min: 50, grade: 'C',  val: 6, color: '#facc15', desc: 'Kepujian' },
          { min: 45, grade: 'D',  val: 7, color: '#f97316', desc: 'Lulus Atas' },
          { min: 40, grade: 'E',  val: 8, color: '#fb923c', desc: 'Lulus' },
          { min: 0, grade: 'G',   val: 9, color: '#ef4444', desc: 'Gagal' },
        ];

        const CLASS_COLORS = [
          '#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#6366f1', '#14b8a6'
        ];

        // --- 3. HELPER FUNCTIONS ---

        const getAssessmentStats = (assessmentId, marksObj) => {
          const config = ASSESSMENT_CONFIG[assessmentId];
          if (!marksObj) return { raw: 0, percentage: 0, grade: '-', val: 9, isTH: false, isEmpty: true };

          const values = Object.values(marksObj);
          const isTH = values.length > 0 && values.every(v => v === 'TH');
          
          if (isTH) return { raw: 0, percentage: 0, grade: 'TH', val: 9, isTH: true, isEmpty: false };

          let rawTotal = 0;
          let isEmpty = true;

          if (config.type === 'single') {
            const val = marksObj.total !== undefined ? marksObj.total : marksObj;
            if (val !== undefined && val !== '') {
               rawTotal = parseInt(val) || 0;
               isEmpty = false;
            }
          } else {
            rawTotal = PAPERS.reduce((sum, p) => {
              const val = marksObj[p.id];
              if (val !== undefined && val !== '' && val !== 'TH') {
                isEmpty = false;
                return sum + parseInt(val);
              }
              return sum;
            }, 0);
          }

          if (isEmpty) return { raw: 0, percentage: 0, grade: '-', val: 9, isTH: false, isEmpty: true };

          const percentage = (rawTotal / config.max) * 100;
          const threshold = GRADE_THRESHOLDS.find(t => percentage >= t.min);
          const grade = threshold?.grade || 'G';
          const val = threshold?.val !== undefined ? threshold.val : 9;

          return { raw: rawTotal, percentage, grade, val, isTH: false, isEmpty: false };
        };

        const getGradeColor = (grade) => {
          if (grade === 'TH') return 'bg-gray-200 text-gray-600 border-gray-300';
          if (grade === '-') return 'bg-gray-50 text-gray-400 border-gray-100';
          if (grade.startsWith('A')) return 'bg-green-100 text-green-800 border-green-200';
          if (grade.startsWith('B')) return 'bg-blue-100 text-blue-800 border-blue-200';
          if (grade.startsWith('C')) return 'bg-yellow-100 text-yellow-800 border-yellow-200';
          if (grade === 'D' || grade === 'E') return 'bg-orange-100 text-orange-800 border-orange-200';
          return 'bg-red-100 text-red-800 border-red-200';
        };

        const generateId = () => Math.random().toString(36).substr(2, 9) + Date.now().toString(36);

        const downloadCSV = (content, filename) => {
          const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
          const link = document.createElement("a");
          const url = URL.createObjectURL(blob);
          link.setAttribute("href", url);
          link.setAttribute("download", filename);
          link.style.visibility = 'hidden';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        };

        // --- 4. SHARED COMPONENTS ---

        const TrendChart = ({ data, showValue = true }) => {
          if (!data || data.length === 0) return <div className="h-full flex items-center justify-center text-gray-400 text-xs">No Data</div>;
          const padding = 20;
          const chartHeight = 100; 
          const chartWidth = 300; 
          const points = data.map((point, index) => {
            const x = padding + (index * ((chartWidth - (padding * 2)) / (data.length - 1)));
            const y = chartHeight - (point.percentage * (chartHeight - (padding * 2)) / 100) - padding;
            return { x, y, ...point };
          });
          const pathD = `M ${points.map(p => `${p.x},${p.y}`).join(' L ')}`;
          return (
            <svg viewBox={`0 0 ${chartWidth} ${chartHeight}`} className="w-full h-full" preserveAspectRatio="none">
              <path d={pathD} fill="none" stroke="#3b82f6" strokeWidth="2" vectorEffect="non-scaling-stroke" />
              {points.map((p, i) => (
                <circle key={i} cx={p.x} cy={p.y} r="3" fill="white" stroke="#3b82f6" strokeWidth="2" vectorEffect="non-scaling-stroke" />
              ))}
            </svg>
          );
        };

        const MultiLineChart = ({ series, categories, target }) => {
          if (!series || series.length === 0) return <div className="h-64 flex items-center justify-center text-gray-400">No data available</div>;
          const padding = 40;
          const chartHeight = 250;
          const chartWidth = 800; 
          const contentWidth = chartWidth - (padding * 2);
          const contentHeight = chartHeight - (padding * 2);
          const targetY = target !== undefined ? chartHeight - padding - (target * contentHeight / 100) : null;

          return (
            <div className="w-full overflow-x-auto">
              <svg viewBox={`0 0 ${chartWidth} ${chartHeight}`} className="w-full h-full" style={{ minWidth: '600px' }}>
                {[0, 25, 50, 75, 100].map(tick => {
                  const y = chartHeight - padding - (tick * contentHeight / 100);
                  return (
                    <g key={tick}>
                      <line x1={padding} y1={y} x2={chartWidth - padding} y2={y} stroke="#f3f4f6" strokeWidth="1" />
                      <text x={padding - 5} y={y + 3} fontSize="10" fill="#9ca3af" textAnchor="end">{tick}%</text>
                    </g>
                  );
                })}
                {targetY !== null && (
                  <g>
                    <line x1={padding} y1={targetY} x2={chartWidth - padding} y2={targetY} stroke="#ef4444" strokeWidth="2" strokeDasharray="5,5" opacity={0.6} />
                    <text x={chartWidth - padding + 5} y={targetY + 4} fontSize="10" fill="#ef4444" fontWeight="bold">KPI {target}%</text>
                  </g>
                )}
                {categories.map((cat, i) => {
                  const x = padding + (i * (contentWidth / (categories.length - 1)));
                  return <text key={i} x={x} y={chartHeight - padding + 15} fontSize="10" textAnchor="middle" fill="#6b7280">{cat}</text>;
                })}
                {series.map((line, idx) => {
                  const points = line.data.map((val, i) => {
                    const x = padding + (i * (contentWidth / (categories.length - 1)));
                    const y = chartHeight - padding - (val * contentHeight / 100);
                    return `${x},${y}`;
                  }).join(' L ');
                  return (
                    <g key={idx}>
                      <path d={`M ${points}`} fill="none" stroke={line.color} strokeWidth={line.isDashed ? "2" : "3"} strokeDasharray={line.isDashed ? "5,5" : ""} opacity={0.8} />
                      {line.data.map((val, i) => {
                        const x = padding + (i * (contentWidth / (categories.length - 1)));
                        const y = chartHeight - padding - (val * contentHeight / 100);
                        return (
                          <g key={i} className="group">
                            <circle cx={x} cy={y} r="4" fill="white" stroke={line.color} strokeWidth="2" />
                            <title>{line.name}: {val.toFixed(1)}%</title>
                          </g>
                        );
                      })}
                    </g>
                  );
                })}
              </svg>
            </div>
          );
        };

        const SimplePieChart = ({ data }) => {
          const total = data.reduce((acc, curr) => acc + curr.value, 0);
          if (total === 0) return <div className="h-40 flex items-center justify-center text-gray-400">No Data</div>;
          let currentDeg = 0;
          const gradientParts = data.map(item => {
            const deg = (item.value / total) * 360;
            const part = `${item.color} ${currentDeg}deg ${currentDeg + deg}deg`;
            currentDeg += deg;
            return part;
          });
          return (
            <div className="flex flex-col items-center justify-center py-2">
              <div className="w-32 h-32 rounded-full shadow-inner border-4 border-white mb-4 relative" style={{ background: `conic-gradient(${gradientParts.join(', ')})` }}>
                <div className="absolute inset-0 flex items-center justify-center">
                   <div className="w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-sm">
                     <div className="text-center leading-none">
                         <span className="text-[9px] text-gray-400 uppercase">Total</span>
                         <div className="text-sm font-bold text-gray-700">{total}</div>
                     </div>
                   </div>
                </div>
              </div>
              <div className="grid grid-cols-2 gap-x-4 gap-y-1 w-full max-w-[200px]">
                {data.map((item, idx) => (
                  item.value > 0 && (
                    <div key={idx} className="flex items-center gap-1.5 text-[10px]">
                      <span className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{ backgroundColor: item.color }}></span>
                      <span className="text-slate-600 font-medium">{item.label}</span>
                      <span className="text-slate-400 ml-auto">{Math.round((item.value/total)*100)}%</span>
                    </div>
                  )
                ))}
              </div>
            </div>
          );
        };

        const HeadcountSection = ({ studentList, title }) => {
          const headcountData = ASSESSMENTS.map(a => {
            const counts = { 'A+':0,'A':0,'A-':0,'B+':0,'B':0,'C+':0,'C':0,'D':0,'E':0,'G':0,'TH':0 };
            let totalVal = 0, studentCount = 0;
            studentList.forEach(s => {
              const stats = getAssessmentStats(a.id, s.marks[a.id]);
              if (!stats.isEmpty) {
                if (stats.isTH) { counts['TH']++; totalVal += 9; studentCount++; } 
                else { if (counts[stats.grade] !== undefined) counts[stats.grade]++; totalVal += stats.val; studentCount++; }
              }
            });
            return { id: a.id, label: a.label, counts, gpmp: studentCount > 0 ? (totalVal / studentCount).toFixed(2) : '0.00' };
          });

          return (
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mt-6">
              <div className="p-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                 <h3 className="font-semibold text-slate-700 flex items-center gap-2"><BarChart2 className="w-5 h-5 text-blue-500" /> Headcount Analysis ({title})</h3>
                 <div className="text-xs text-slate-500 bg-white px-2 py-1 rounded border border-slate-200">Lower GPMP = Better</div>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-sm text-center">
                  <thead className="bg-slate-50 border-b text-xs uppercase text-slate-500">
                    <tr>
                      <th className="px-4 py-3 text-left w-24 border-r sticky left-0 bg-slate-50 z-10">Grade</th>
                      {headcountData.map(h => <th key={h.id} className="px-2 py-3 min-w-[60px]">{h.label}</th>)}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {GRADE_THRESHOLDS.map(g => (
                      <tr key={g.grade} className="hover:bg-slate-50">
                        <td className="px-4 py-2 font-bold text-left sticky left-0 bg-white z-10 border-r text-slate-700 flex items-center gap-2">
                          <span className="w-2 h-2 rounded-full" style={{ backgroundColor: g.color }}></span>{g.grade}
                        </td>
                        {headcountData.map(h => <td key={h.id} className={`px-2 py-2 ${h.counts[g.grade] > 0 ? 'text-slate-800 font-medium' : 'text-slate-300'}`}>{h.counts[g.grade] || '-'}</td>)}
                      </tr>
                    ))}
                     <tr className="bg-blue-50 border-t-2 border-slate-200 font-bold">
                        <td className="px-4 py-3 text-left sticky left-0 bg-blue-100 z-10 border-r text-blue-900">GPMP</td>
                        {headcountData.map(h => <td key={h.id} className="px-2 py-3 text-blue-900">{h.gpmp}</td>)}
                     </tr>
                  </tbody>
                </table>
              </div>
            </div>
          );
        };

        // --- 5. VIEW COMPONENTS ---

        const MasterView = ({ data, currentClass, onBulkImport, onUpdate, onDelete, setCurrentClass, role }) => {
          const [searchTerm, setSearchTerm] = useState('');
          const [isAdding, setIsAdding] = useState(false);
          const [addMode, setAddMode] = useState('single');
          const [newName, setNewName] = useState('');
          const [batchId, setBatchId] = useState(null);
          
          const [bulkAssessmentId, setBulkAssessmentId] = useState('');
          const [importPaperId, setImportPaperId] = useState('all');
          const fileInputRef = useRef(null);

          const filtered = data.filter(s => s.name.toLowerCase().includes(searchTerm.toLowerCase()));

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
              setNewName(event.target.result);
            };
            reader.readAsText(file);
            if (fileInputRef.current) fileInputRef.current.value = '';
          };

          const handleProcessAdd = () => {
            const studentsToImport = [];

            if (addMode === 'single') {
              if (!newName.trim()) return;
              studentsToImport.push({ name: newName.trim(), marks: {} });
            } else {
              const lines = newName.split(/\r?\n/);
              lines.forEach(line => {
                const parts = line.split('\t');
                let name = parts[0]?.trim();
                if (name) {
                  let marks = {};
                  if (bulkAssessmentId) {
                    const config = ASSESSMENT_CONFIG[bulkAssessmentId];
                    const parseVal = (v) => {
                      if (!v) return undefined;
                      const trimmed = v.trim().toUpperCase();
                      if (trimmed === 'TH') return 'TH';
                      const n = parseInt(trimmed);
                      return isNaN(n) ? undefined : n;
                    };

                    if (config.type === 'single') {
                      const val = parseVal(parts[1]);
                      if (val !== undefined) {
                         marks = { [bulkAssessmentId]: { total: val === 'TH' ? 'TH' : Math.min(Math.max(0, val), 100) } };
                      }
                    } else {
                      const marksToUpdate = {};
                      if (importPaperId === 'all') {
                        const p1 = parseVal(parts[1]);
                        const p2 = parseVal(parts[2]);
                        const p3 = parseVal(parts[3]);
                        const p4 = parseVal(parts[4]);
                        if (p1 !== undefined) marksToUpdate.p1 = p1 === 'TH' ? 'TH' : Math.min(Math.max(0, p1), 40);
                        if (p2 !== undefined) marksToUpdate.p2 = p2 === 'TH' ? 'TH' : Math.min(Math.max(0, p2), 60);
                        if (p3 !== undefined) marksToUpdate.p3 = p3 === 'TH' ? 'TH' : Math.min(Math.max(0, p3), 25);
                        if (p4 !== undefined) marksToUpdate.p4 = p4 === 'TH' ? 'TH' : Math.min(Math.max(0, p4), 30);
                      } else {
                        const val = parseVal(parts[1]);
                        if (val !== undefined) {
                          const max = PAPERS.find(p => p.id === importPaperId).max;
                          marksToUpdate[importPaperId] = val === 'TH' ? 'TH' : Math.min(Math.max(0, val), max);
                        }
                      }
                      if (Object.keys(marksToUpdate).length > 0) {
                         marks = { [bulkAssessmentId]: marksToUpdate };
                      }
                    }
                  }
                  studentsToImport.push({ name, marks });
                }
              });
            }

            if (studentsToImport.length > 0) {
              onBulkImport(studentsToImport);
              setIsAdding(false);
              setNewName('');
              setBulkAssessmentId('');
            }
          };

          return (
            <div className="space-y-6 animate-in fade-in duration-500">
              <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col md:flex-row gap-4 justify-between">
                <div className="flex gap-2">
                  {role === 'teacher' && (
                    <>
                      <button onClick={() => { setIsAdding(true); setAddMode('single'); }} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 hover:bg-blue-700"><Plus className="w-4 h-4"/> Add Student</button>
                      <button onClick={() => { setIsAdding(true); setAddMode('bulk'); }} className="border border-slate-300 text-slate-700 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-50">Bulk Import</button>
                    </>
                  )}
                </div>
                <div className="relative w-full md:w-64">
                   <Search className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
                   <input type="text" placeholder="Search..." className="w-full pl-9 pr-4 py-2 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                </div>
              </div>

              {isAdding && (
                <div className="bg-white p-4 rounded-xl shadow border border-slate-200 animate-in fade-in zoom-in-95 mb-6">
                   <div className="flex justify-between mb-2">
                     <h3 className="font-bold text-slate-700">{addMode === 'bulk' ? 'Bulk Add / Import Marks' : 'Add Single Student'}</h3>
                     <button onClick={() => setIsAdding(false)}><X className="w-4 h-4 text-slate-400" /></button>
                   </div>
                   
                   {addMode === 'bulk' && (
                      <div className="grid grid-cols-2 gap-3 mb-3">
                         <div>
                           <label className="text-xs font-semibold text-gray-500 uppercase block mb-1">Assessment (Optional)</label>
                           <select className="w-full p-2 border border-slate-300 rounded-lg text-sm bg-white" value={bulkAssessmentId} onChange={(e) => setBulkAssessmentId(e.target.value)}>
                             <option value="">Names Only (No Marks)</option>
                             {ASSESSMENTS.map(a => <option key={a.id} value={a.id}>{a.label}</option>)}
                           </select>
                         </div>
                         {bulkAssessmentId && ASSESSMENT_CONFIG[bulkAssessmentId].type === 'paper' && (
                           <div>
                              <label className="text-xs font-semibold text-gray-500 uppercase block mb-1">Target Column</label>
                              <select className="w-full p-2 border border-slate-300 rounded-lg text-sm bg-white" value={importPaperId} onChange={(e) => setImportPaperId(e.target.value)}>
                                <option value="all">All Papers (P1-P4)</option>
                                <option value="p1">Reading (P1)</option>
                                <option value="p2">Writing (P2)</option>
                                <option value="p3">Speaking (P3)</option>
                                <option value="p4">Listening (P4)</option>
                              </select>
                           </div>
                         )}
                      </div>
                   )}

                   {addMode === 'bulk' ? (
                     <div className="mb-3">
                        <div className="flex justify-between items-center mb-1">
                           <label className="text-xs font-semibold text-gray-500 uppercase">Data Source</label>
                           <span className="text-[10px] text-blue-600 cursor-pointer hover:underline" onClick={() => fileInputRef.current?.click()}>
                             Upload CSV/Text File
                           </span>
                           <input 
                             type="file" 
                             ref={fileInputRef} 
                             className="hidden" 
                             accept=".csv,.txt"
                             onChange={handleFileUpload} 
                           />
                        </div>
                        <textarea 
                           className="w-full p-2 border rounded-lg text-xs font-mono h-32" 
                           placeholder={bulkAssessmentId ? `Name\tScore...` : `Ali bin Abu\nSiti...`} 
                           value={newName} 
                           onChange={e => setNewName(e.target.value)} 
                         />
                         <p className="text-[10px] text-slate-400 mt-1">
                           {bulkAssessmentId 
                              ? (importPaperId === 'all' ? "Excel Format: Name [Tab] P1 [Tab] P2 [Tab] P3 [Tab] P4" : "Excel Format: Name [Tab] Score")
                              : "Excel Format: Name (one per line)"}
                         </p>
                     </div>
                   ) : (
                     <input className="w-full p-2 border rounded-lg text-sm" placeholder="Student Name" value={newName} onChange={e => setNewName(e.target.value)} />
                   )}
                   
                   <button onClick={handleProcessAdd} className="mt-2 w-full bg-blue-600 text-white py-2 rounded-lg text-sm font-medium">Process & Save to {currentClass}</button>
                </div>
              )}

              <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                <h4 className="text-xs font-bold text-slate-500 uppercase mb-2">Batch Entry Mode</h4>
                <div className="flex flex-wrap gap-2">
                  {ASSESSMENTS.map(a => (
                    <button key={a.id} onClick={() => setBatchId(batchId === a.id ? null : a.id)} className={`px-3 py-1 text-xs rounded-md border transition-colors ${batchId === a.id ? 'bg-blue-600 text-white border-blue-600' : 'bg-slate-50 text-slate-600 border-slate-200 hover:border-blue-400'}`}>{a.label}</button>
                  ))}
                </div>
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead className="bg-slate-50 text-xs text-slate-500 uppercase font-semibold">
                      <tr>
                        <th className="px-4 py-3 text-left w-64 sticky left-0 bg-slate-50 shadow-sm z-10">Name</th>
                        {role === 'admin' && <th className="px-4 py-3 text-left">School</th>}
                        {batchId ? (ASSESSMENT_CONFIG[batchId].type === 'single' ? <th className="px-4 py-3 text-center">Score /100</th> : PAPERS.map(p => <th key={p.id} className="px-2 py-3 text-center">{p.id.toUpperCase()}</th>)) : ASSESSMENTS.map(a => <th key={a.id} className="px-2 py-3 text-center">{a.label}</th>)}
                        {role === 'teacher' && <th className="px-2 py-3 text-center w-10">Del</th>}
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {filtered.length === 0 ? 
                        <tr><td colSpan={12} className="p-8 text-center text-gray-400">No students found. {role === 'teacher' ? 'Add one above.' : 'Check filter.'}</td></tr>
                      : filtered.map(s => (
                        <tr key={s.id} className="hover:bg-slate-50">
                          <td className="px-4 py-3 font-medium text-slate-900 sticky left-0 bg-white hover:bg-slate-50 shadow-sm z-10">{s.name}</td>
                          {role === 'admin' && <td className="px-4 py-3 text-slate-500 text-xs">{s.schoolName}</td>}
                          {batchId ? (ASSESSMENT_CONFIG[batchId].type === 'single' ? <td className="p-1 text-center"><input className="w-16 text-center border rounded py-1" placeholder="-" value={s.marks?.[batchId]?.total || ''} onChange={e => onUpdate(s.id, batchId, 'total', e.target.value)} /></td> : PAPERS.map(p => <td key={p.id} className="p-1 text-center"><input className="w-full text-center border rounded py-1" placeholder="-" value={s.marks?.[batchId]?.[p.id] || ''} onChange={e => onUpdate(s.id, batchId, p.id, e.target.value)} /></td>)) : ASSESSMENTS.map(a => { const stats = getAssessmentStats(a.id, s.marks[a.id]); return <td key={a.id} className="px-2 py-3 text-center"><span className={`px-2 py-1 rounded text-[10px] font-bold ${getGradeColor(stats.grade)}`}>{stats.isTH ? 'TH' : stats.grade}</span></td>; })}
                          {role === 'teacher' && (
                            <td className="p-1 text-center">
                              <button onClick={() => onDelete(s.id)} className="text-red-400 hover:text-red-600 p-1">
                                <Trash2 className="w-4 h-4" />
                              </button>
                            </td>
                          )}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );
        };

        const PersonalView = ({ data, onDelete, onUpdate }) => {
          const [selectedId, setSelectedId] = useState(null);
          const [search, setSearch] = useState('');
          const filtered = data.filter(s => s.name.toLowerCase().includes(search.toLowerCase()));
          const student = data.find(s => s.id === selectedId);
          const studentGraphData = student ? ASSESSMENTS.map(a => ({ label: a.label, percentage: getAssessmentStats(a.id, student.marks[a.id]).isTH ? 0 : getAssessmentStats(a.id, student.marks[a.id]).percentage })) : [];

          return (
            <div className="flex flex-col lg:flex-row gap-6 h-[calc(100vh-140px)]">
              <div className="w-full lg:w-72 bg-white rounded-xl border border-slate-200 shadow-sm flex flex-col h-full overflow-hidden">
                <div className="p-3 border-b border-slate-100"><input className="w-full p-2 text-xs border rounded-lg bg-slate-50" placeholder="Search..." value={search} onChange={e => setSearch(e.target.value)} /></div>
                <div className="flex-1 overflow-y-auto p-2">
                  {filtered.map(s => <button key={s.id} onClick={() => setSelectedId(s.id)} className={`w-full text-left p-2 rounded text-sm mb-1 ${selectedId === s.id ? 'bg-blue-50 text-blue-700 font-medium' : 'hover:bg-slate-50 text-slate-600'}`}>{s.name}</button>)}
                </div>
              </div>
              <div className="flex-1 h-full overflow-y-auto bg-white rounded-xl border border-slate-200 shadow-sm p-6">
                {student ? (
                  <div className="space-y-6">
                    <div className="flex justify-between items-center"><h2 className="text-2xl font-bold text-slate-800">{student.name}</h2><button onClick={() => onDelete(student.id)} className="text-red-500 bg-red-50 px-3 py-1 rounded text-xs font-bold hover:bg-red-100">Delete</button></div>
                    <div className="h-48 w-full"><TrendChart data={studentGraphData} /></div>
                    <div className="overflow-x-auto"><table className="w-full text-sm border-collapse"><thead><tr className="border-b text-xs text-slate-500 uppercase"><th className="p-2 text-left w-32 bg-slate-50">Item</th>{ASSESSMENTS.map(a => <th key={a.id} className="p-2 text-center border-l bg-slate-50 min-w-[80px]">{a.label}</th>)}</tr></thead><tbody>{PAPERS.map(p => <tr key={p.id} className="border-b"><td className="p-2 font-medium text-slate-700 bg-slate-50/50">{p.id.toUpperCase()} <span className="text-[10px] text-slate-400">/{p.max}</span></td>{ASSESSMENTS.map(a => { const isPaper = ASSESSMENT_CONFIG[a.id].type === 'paper'; return <td key={a.id} className="p-1 border-l text-center">{isPaper ? <input className="w-full text-center py-1 rounded hover:bg-slate-50 focus:bg-white focus:ring-1 focus:ring-blue-500" placeholder="-" value={student.marks?.[a.id]?.[p.id] || ''} onChange={e => onUpdate(student.id, a.id, p.id, e.target.value)} /> : <span className="text-slate-300">-</span>}</td> })}</tr>)}<tr className="bg-blue-50/10 border-b"><td className="p-2 font-bold text-slate-800 bg-slate-50">Total</td>{ASSESSMENTS.map(a => { const stats = getAssessmentStats(a.id, student.marks[a.id]); const isSingle = ASSESSMENT_CONFIG[a.id].type === 'single'; return <td key={a.id} className="p-2 border-l text-center">{isSingle ? <input className="w-full text-center font-bold bg-transparent focus:bg-white" placeholder="/100" value={student.marks?.[a.id]?.total || ''} onChange={e => onUpdate(student.id, a.id, 'total', e.target.value)} /> : <div className="flex flex-col"><span className="text-blue-700 font-bold text-lg">{stats.percentage.toFixed(1)}%</span><span className="text-[10px] text-slate-400">{stats.raw}/{ASSESSMENT_CONFIG[a.id].max}</span></div>}</td> })}</tr></tbody></table></div>
                    <Legend />
                  </div>
                ) : <div className="h-full flex items-center justify-center text-slate-400">Select a student</div>}
              </div>
            </div>
          );
        };

        const ClassAnalysisView = ({ data, title }) => {
          const classTrendData = ASSESSMENTS.map(a => {
            let totalPerc = 0, count = 0;
            data.forEach(s => { const stats = getAssessmentStats(a.id, s.marks[a.id]); if (!stats.isEmpty && !stats.isTH) { totalPerc += stats.percentage; count++; } });
            return { label: a.label, percentage: count > 0 ? totalPerc / count : 0 };
          });
          return (
            <div className="space-y-6">
              <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm"><h3 className="font-bold text-slate-700 mb-4">Performance Curve: {title}</h3><div className="h-64"><TrendChart data={classTrendData} /></div></div>
              <HeadcountSection studentList={data} title={title} />
            </div>
          );
        };

        const GlobalAnalysisView = ({ data, session, targetKPI, setTargetKPI, targetGPMP, setTargetGPMP, manualClasses }) => {
          const [viewMode, setViewMode] = useState('overview'); 
          const [selectedSchool, setSelectedSchool] = useState(session.role === 'admin' ? 'All' : session.schoolName);
          const [selectedClass, setSelectedClass] = useState('All');
          const [compareClass, setCompareClass] = useState('None');
          const [studentSearch, setStudentSearch] = useState('');
          const [compareClassA, setCompareClassA] = useState('');
          const [compareClassB, setCompareClassB] = useState('');
          
          const schools = useMemo(() => ['All', ...new Set(data.map(d => d.schoolName))].sort(), [data]);
          const classes = useMemo(() => {
            const filteredBySchool = selectedSchool === 'All' ? data : data.filter(d => d.schoolName === selectedSchool);
            if (selectedSchool === 'All') {
              const counts = {};
              filteredBySchool.forEach(d => { if (!counts[d.className]) counts[d.className] = new Set(); counts[d.className].add(d.schoolName); });
              const options = new Set();
              filteredBySchool.forEach(d => { if (counts[d.className].size > 1) { options.add(`${d.className} (${d.schoolName})`); } else { options.add(d.className); } });
              return ['All', ...options].sort();
            }
            return ['All', ...new Set(filteredBySchool.map(d => d.className))].sort();
          }, [data, selectedSchool]);

          // Dropdown options for compare (filtering 'All')
          const dropdownClasses = useMemo(() => classes.filter(c => c !== 'All'), [classes]);

          const filteredDataSet = useMemo(() => {
            return data.filter(d => {
              const matchSchool = selectedSchool === 'All' || d.schoolName === selectedSchool;
              let matchClass = true;
              if (viewMode !== 'compare') { 
                  if (selectedClass !== 'All') {
                    const compositeMatch = selectedClass.match(/^(.*) \((.*)\)$/);
                    if (compositeMatch) { matchClass = d.className === compositeMatch[1] && d.schoolName === compositeMatch[2]; } else { matchClass = d.className === selectedClass; }
                  }
              }
              const matchName = d.name.toLowerCase().includes(studentSearch.toLowerCase());
              return matchSchool && matchClass && matchName;
            });
          }, [data, selectedSchool, selectedClass, studentSearch, viewMode]);

          const totalStudents = filteredDataSet.length;
          const currentAvg = useMemo(() => {
            let tot = 0, cnt = 0;
            filteredDataSet.forEach(s => { const st = getAssessmentStats('spmc', s.marks.spmc); if(!st.isEmpty){ tot+=st.percentage; cnt++ } });
            return cnt > 0 ? tot/cnt : 0;
          }, [filteredDataSet]);

          const currentGPMP = useMemo(() => {
            let totalVal = 0, count = 0;
            filteredDataSet.forEach(s => { const st = getAssessmentStats('spmc', s.marks.spmc); if (!st.isEmpty) { if (st.isTH) { totalVal += 9; count++; } else { totalVal += st.val; count++; } } });
            return count > 0 ? totalVal / count : 0;
          }, [filteredDataSet]);

          const seriesData = useMemo(() => {
            const mainSeries = [];
            if (viewMode === 'compare' && compareClassA && compareClassB) {
              const getAvg = (className) => {
                 // Handle composite names like "5 Alpha (SMK A)" for admins
                 let targetClassName = className;
                 let targetSchoolName = selectedSchool;

                 const compositeMatch = className.match(/^(.*) \((.*)\)$/);
                 if (compositeMatch) {
                    targetClassName = compositeMatch[1];
                    targetSchoolName = compositeMatch[2];
                 }

                 const classData = data.filter(d => d.className === targetClassName && (targetSchoolName === 'All' || d.schoolName === targetSchoolName));
                 
                 return ASSESSMENTS.map(a => {
                    let t=0, c=0; 
                    classData.forEach(s => { const st=getAssessmentStats(a.id,s.marks[a.id]); if(!st.isEmpty){t+=st.percentage;c++} }); 
                    return c>0?t/c:0;
                 });
              };
              
              if (compareClassA) mainSeries.push({ name: compareClassA, color: '#3b82f6', data: getAvg(compareClassA) });
              if (compareClassB) mainSeries.push({ name: compareClassB, color: '#ef4444', data: getAvg(compareClassB) });
              
              return mainSeries;
            } else {
                if (studentSearch) {
                     return filteredDataSet.slice(0, 10).map((s, idx) => ({ name: s.name, color: CLASS_COLORS[idx % CLASS_COLORS.length], data: ASSESSMENTS.map(a => getAssessmentStats(a.id, s.marks[a.id]).percentage) }));
                } else if (selectedClass !== 'All') {
                     const avg = ASSESSMENTS.map(a => { let t=0,c=0; filteredDataSet.forEach(s=>{ const st=getAssessmentStats(a.id,s.marks[a.id]); if(!st.isEmpty){t+=st.percentage;c++} }); return c>0?t/c:0; });
                     return [{ name: `${selectedClass} Avg`, color: '#3b82f6', data: avg }];
                } else {
                    if (selectedSchool === 'All' && session.role === 'admin') {
                         return schools.filter(s => s!=='All').map((s, i) => {
                             const sData = data.filter(d => d.schoolName === s);
                             const pts = ASSESSMENTS.map(a => { let t=0,cnt=0; sData.forEach(st=>{ const stat=getAssessmentStats(a.id,st.marks[a.id]); if(!stat.isEmpty){t+=stat.percentage;cnt++} }); return cnt>0?t/cnt:0; });
                             return { name: s, color: CLASS_COLORS[i % CLASS_COLORS.length], data: pts };
                         });
                    } else {
                         const relevantClasses = classes.filter(c => c !== 'All').slice(0, 5);
                         return relevantClasses.map((c, i) => {
                             let targetCN = c;
                             let targetSN = selectedSchool;
                             const compositeMatch = c.match(/^(.*) \((.*)\)$/);
                             if (compositeMatch) { targetCN = compositeMatch[1]; targetSN = compositeMatch[2]; }

                             const cData = data.filter(d => d.className === targetCN && (targetSN === 'All' || d.schoolName === targetSN));
                             const pts = ASSESSMENTS.map(a => { let t=0,cnt=0; cData.forEach(s=>{ const st=getAssessmentStats(a.id,s.marks[a.id]); if(!stat.isEmpty){t+=stat.percentage;cnt++} }); return cnt>0?t/cnt:0; });
                             return { name: c, color: CLASS_COLORS[i % CLASS_COLORS.length], data: pts };
                         });
                    }
                }
            }
          }, [viewMode, compareClassA, compareClassB, filteredDataSet, studentSearch, selectedClass, selectedSchool, schools, classes, data, session]);

          // Comparison List Filter
          const comparisonStudentList = useMemo(() => {
             if (viewMode !== 'compare') return [];
             
             const getFilter = (clsName) => {
                let targetCN = clsName;
                let targetSN = selectedSchool;
                const compositeMatch = clsName.match(/^(.*) \((.*)\)$/);
                if (compositeMatch) { targetCN = compositeMatch[1]; targetSN = compositeMatch[2]; }
                return (d) => d.className === targetCN && (targetSN === 'All' || d.schoolName === targetSN);
             };

             return data.filter(d => getFilter(compareClassA)(d) || getFilter(compareClassB)(d));
          }, [data, viewMode, compareClassA, compareClassB, selectedSchool]);


          return (
            <div className="space-y-6 animate-in fade-in">
              <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-wrap gap-4 items-center justify-between">
                 <div className="flex flex-wrap gap-4 items-center flex-1">
                   <div className="flex items-center gap-2"><Layers className="w-4 h-4 text-blue-500" /><span className="text-xs font-bold uppercase text-slate-500">Analysis Level:</span></div>
                   {session.role === 'admin' && ( <select className="bg-slate-50 border p-2 rounded text-sm" value={selectedSchool} onChange={e => { setSelectedSchool(e.target.value); setSelectedClass('All'); setCompareClassA(''); setCompareClassB(''); }}>{schools.map(s => <option key={s} value={s}>{s === 'All' ? 'All Schools' : s}</option>)}</select> )}
                   
                   <div className="flex items-center gap-2 bg-slate-50 p-1 rounded-lg border border-slate-200">
                       <button onClick={() => setViewMode('overview')} className={`px-3 py-1 text-xs font-bold rounded-md transition-all ${viewMode === 'overview' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>Overview</button>
                       <button onClick={() => setViewMode('compare')} className={`px-3 py-1 text-xs font-bold rounded-md transition-all ${viewMode === 'compare' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>Compare</button>
                   </div>

                   {viewMode === 'overview' ? (
                      <div className="flex items-center gap-2">
                          <select className="bg-white border p-2 rounded text-sm min-w-[150px]" value={selectedClass} onChange={e => setSelectedClass(e.target.value)}>{classes.map(c => <option key={c} value={c}>{c === 'All' ? 'All Classes' : c}</option>)}</select>
                          <div className="relative"><Search className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" /><input className="w-full pl-9 p-2 border rounded text-sm" placeholder="Filter student..." value={studentSearch} onChange={e => setStudentSearch(e.target.value)} /></div>
                      </div>
                   ) : (
                      <div className="flex items-center gap-2">
                         <select className="bg-white border border-blue-200 p-2 rounded text-sm text-blue-700 font-medium" value={compareClassA} onChange={e => setCompareClassA(e.target.value)}><option value="">Select Class A</option>{dropdownClasses.map(c => <option key={c} value={c}>{c}</option>)}</select>
                         <span className="text-slate-400 font-bold px-1">VS</span>
                         <select className="bg-white border border-red-200 p-2 rounded text-sm text-red-700 font-medium" value={compareClassB} onChange={e => setCompareClassB(e.target.value)}><option value="">Select Class B</option>{dropdownClasses.map(c => <option key={c} value={c}>{c}</option>)}</select>
                      </div>
                   )}
                 </div>
                 <div className="flex items-center gap-4 pl-4 border-l border-slate-200">
                    <div className="flex items-center gap-2"><Target className="w-4 h-4 text-red-500" /><span className="text-xs font-bold uppercase text-slate-500 hidden sm:inline">Target %:</span><div className="relative"><input type="number" min="0" max="100" className="w-16 p-2 text-sm border border-red-200 rounded-lg text-center font-bold text-red-600 focus:outline-none focus:ring-1 focus:ring-red-500" value={targetKPI} onChange={(e) => setTargetKPI(parseFloat(e.target.value) || 0)} /></div></div>
                    <div className="flex items-center gap-2"><Calculator className="w-4 h-4 text-blue-500" /><span className="text-xs font-bold uppercase text-slate-500 hidden sm:inline">Target GPMP:</span><input type="number" min="0" max="9" step="0.01" className="w-16 p-2 text-sm border border-blue-200 rounded-lg text-center font-bold text-blue-600 focus:outline-none focus:ring-1 focus:ring-blue-500" value={targetGPMP} onChange={(e) => setTargetGPMP(parseFloat(e.target.value) || 0)} /></div>
                 </div>
              </div>
              
              {viewMode === 'overview' && (
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div className="bg-white p-4 rounded-xl border shadow-sm"><div className="text-xs text-slate-500 uppercase">Population</div><div className="text-2xl font-bold text-slate-800">{totalStudents} <span className="text-sm font-normal text-slate-400">students</span></div></div>
                  <div className="bg-white p-4 rounded-xl border shadow-sm"><div className="text-xs text-slate-500 uppercase">Current Avg (SPMC)</div><div className="flex items-end gap-2"><div className="text-2xl font-bold text-blue-600">{currentAvg.toFixed(1)}%</div><div className={`text-xs font-medium mb-1 ${currentAvg >= targetKPI ? 'text-green-500' : 'text-red-500'}`}>{currentAvg >= targetKPI ? '▲' : '▼'} {Math.abs(currentAvg - targetKPI).toFixed(1)}%</div></div></div>
                  <div className="bg-white p-4 rounded-xl border shadow-sm"><div className="text-xs text-slate-500 uppercase">Current GPMP</div><div className="flex items-end gap-2"><div className="text-2xl font-bold text-slate-800">{currentGPMP.toFixed(2)}</div><div className={`text-xs font-medium mb-1 ${currentGPMP <= targetGPMP ? 'text-green-500' : 'text-red-500'}`}>{currentGPMP <= targetGPMP ? '▲' : '▼'} {Math.abs(currentGPMP - targetGPMP).toFixed(2)}</div></div></div>
                </div>
              )}

              <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm"><h3 className="font-bold text-slate-700 mb-4">{viewMode === 'compare' ? `Comparison: ${compareClassA || '...'} vs ${compareClassB || '...'}` : 'Performance Trajectory'}</h3><div className="h-72"><MultiLineChart series={seriesData} categories={ASSESSMENTS.map(a => a.label)} target={targetKPI} /></div></div>
              
              <HeadcountSection studentList={viewMode === 'compare' ? comparisonStudentList : filteredDataSet} title="Analysis Data" />
            </div>
          );
        };

        const KPIReportView = ({ data, targetKPI, setTargetKPI, targetGPMP, setTargetGPMP }) => {
          const [selectedAssessment, setSelectedAssessment] = useState('spmc');
          const skillAverages = useMemo(() => {
            const totals = { p1: 0, p2: 0, p3: 0, p4: 0 };
            const counts = { p1: 0, p2: 0, p3: 0, p4: 0 };
            data.forEach(s => { const marks = s.marks[selectedAssessment]; if (marks) { PAPERS.forEach(p => { if (marks[p.id] && marks[p.id] !== 'TH') { totals[p.id] += (parseInt(marks[p.id]) / p.max) * 100; counts[p.id]++; } }); } });
            return PAPERS.map(p => ({ ...p, avg: counts[p.id] > 0 ? totals[p.id] / counts[p.id] : 0 })).sort((a, b) => a.avg - b.avg); 
          }, [data, selectedAssessment]);

          const currentAvg = useMemo(() => {
            let tot = 0, cnt = 0;
            data.forEach(s => { const st = getAssessmentStats(selectedAssessment, s.marks[selectedAssessment]); if(!st.isEmpty){ tot+=st.percentage; cnt++ } });
            return cnt > 0 ? tot/cnt : 0;
          }, [data, selectedAssessment]);

          const currentGPMP = useMemo(() => {
            let totalVal = 0, count = 0;
            data.forEach(s => { const st = getAssessmentStats(selectedAssessment, s.marks[selectedAssessment]); if (!st.isEmpty) { if (st.isTH) { totalVal += 9; count++; } else { totalVal += st.val; count++; } } });
            return count > 0 ? totalVal / count : 0;
          }, [data, selectedAssessment]);

          const gap = currentAvg - targetKPI;
          const gpmpGap = targetGPMP - currentGPMP; 
          const weakestSkill = skillAverages[0];

          const handlePrint = () => window.print();
          const handleDownloadCSV = () => {
            const headers = ["Metric", "Value"];
            const rows = [["Assessment", ASSESSMENTS.find(a => a.id === selectedAssessment)?.label], ["Current Average", currentAvg.toFixed(2) + "%"], ["Target KPI", targetKPI + "%"], ["Gap", gap.toFixed(2) + "%"], ["Current GPMP", currentGPMP.toFixed(2)], ["Target GPMP", targetGPMP], ["Weakest Skill", weakestSkill ? weakestSkill.skill : "None"], ["Weakest Skill Score", weakestSkill ? weakestSkill.avg.toFixed(1) + "%" : "0%"]];
            const csvContent = [headers.join(","), ...rows.map(r => r.join(","))].join("\n");
            downloadCSV(csvContent, "KPI_Report.csv");
          };

          // Grade Distribution Data for Pie Chart
          const gradeDistribution = useMemo(() => {
            const counts = {};
            GRADE_THRESHOLDS.forEach(g => counts[g.grade] = 0);
            let hasData = false;
            data.forEach(s => {
              const stats = getAssessmentStats(selectedAssessment, s.marks[selectedAssessment]);
              if (!stats.isEmpty && !stats.isTH) {
                if (counts[stats.grade] !== undefined) counts[stats.grade]++;
                hasData = true;
              }
            });
            return hasData ? GRADE_THRESHOLDS.map(g => ({ label: g.grade, value: counts[g.grade], color: g.color })).filter(item => item.value > 0) : [];
          }, [data, selectedAssessment]);

          // Trend Data for Line Chart
          const trendData = useMemo(() => {
            const points = ASSESSMENTS.map(assessment => {
              let totalScore = 0;
              let count = 0;
              data.forEach(s => {
                const stats = getAssessmentStats(assessment.id, s.marks[assessment.id]);
                if (!stats.isEmpty && !stats.isTH) {
                  totalScore += stats.percentage;
                  count++;
                }
              });
              return count > 0 ? totalScore / count : 0;
            });
            // Check if we have any data to show
            if (points.every(p => p === 0)) return [];
            return [{ name: "Average Score", color: "#3b82f6", data: points }];
          }, [data]);


          return (
            <div className="space-y-6 animate-in fade-in pb-10">
              <div className="print:hidden bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-wrap items-center justify-between gap-4">
                 <div className="flex items-center gap-4">
                   <div className="flex items-center gap-2"><Target className="w-5 h-5 text-red-500" /><span className="text-sm font-bold text-slate-700">Target %:</span><div className="relative"><input type="number" step="0.01" className="w-20 p-2 text-sm border border-red-200 rounded-lg text-center font-bold text-red-600 focus:outline-none focus:ring-1 focus:ring-red-500" value={targetKPI} onChange={(e) => setTargetKPI(parseFloat(e.target.value) || 0)} /><span className="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-red-300">%</span></div></div>
                   <div className="flex items-center gap-2"><Calculator className="w-5 h-5 text-blue-500" /><span className="text-sm font-bold text-slate-700">Target GPMP:</span><input type="number" step="0.01" className="w-20 p-2 text-sm border border-blue-200 rounded-lg text-center font-bold text-blue-600 focus:outline-none focus:ring-1 focus:ring-blue-500" value={targetGPMP} onChange={(e) => setTargetGPMP(parseFloat(e.target.value) || 0)} /></div>
                   <div className="h-6 w-px bg-slate-200"></div>
                   <select className="p-2 border rounded-lg text-sm bg-slate-50" value={selectedAssessment} onChange={(e) => setSelectedAssessment(e.target.value)}>{ASSESSMENTS.map(a => <option key={a.id} value={a.id}>Report For: {a.label}</option>)}</select>
                 </div>
                 <div className="flex gap-2"><button onClick={handleDownloadCSV} className="flex items-center gap-2 bg-white border border-slate-300 text-slate-700 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 transition-colors"><FileSpreadsheet className="w-4 h-4" /> Export Excel</button><button onClick={handlePrint} className="flex items-center gap-2 bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-700 transition-colors"><Printer className="w-4 h-4" /> Print PDF</button></div>
              </div>
              
              <div className="bg-white p-8 rounded-xl shadow-lg border border-slate-200 print:shadow-none print:border-none print:p-0">
                 <div className="flex justify-between items-start mb-8 border-b-2 border-slate-900 pb-4"><div><h1 className="text-3xl font-bold text-slate-900 mb-1">English Performance Report</h1><p className="text-slate-500 font-medium">{ASSESSMENTS.find(a => a.id === selectedAssessment)?.label} Analysis • Generated on {new Date().toLocaleDateString()}</p></div><div className="text-right"><div className="text-4xl font-black text-slate-900">{currentAvg.toFixed(2)}%</div><div className="text-xs uppercase font-bold text-slate-400 tracking-wider">Current Average</div></div></div>
                 
                 <div className="grid grid-cols-2 gap-8 mb-8"><div className={`p-6 rounded-xl border-l-4 ${gap >= 0 ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'}`}><h3 className="text-sm font-bold uppercase tracking-wide mb-1 text-slate-500">Percentage Gap Analysis</h3><div className="flex items-baseline gap-2"><span className={`text-3xl font-bold ${gap >= 0 ? 'text-green-700' : 'text-red-700'}`}>{gap > 0 ? '+' : ''}{gap.toFixed(2)}%</span><span className="text-sm font-medium text-slate-600">from {targetKPI}% Target</span></div><p className="text-xs mt-2 text-slate-500">{gap >= 0 ? "Excellent work! The cohort is performing above the district target." : "Performance is below target. Immediate intervention is recommended to bridge the gap."}</p></div><div className={`p-6 rounded-xl border-l-4 ${gpmpGap >= 0 ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'}`}><h3 className="text-sm font-bold uppercase tracking-wide mb-1 text-slate-500">GPMP Analysis</h3><div className="flex items-baseline gap-2"><span className={`text-3xl font-bold ${gpmpGap >= 0 ? 'text-green-700' : 'text-red-700'}`}>{currentGPMP.toFixed(2)}</span><span className="text-sm font-medium text-slate-600">vs Target {targetGPMP.toFixed(2)}</span></div><p className="text-xs mt-2 text-slate-500">{gpmpGap >= 0 ? "GPMP is on track (Lower is better)." : `GPMP needs improvement by ${Math.abs(gpmpGap).toFixed(2)} points.`}</p></div></div>
                 
                 {/* VISUAL CHARTS SECTION */}
                 <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                    <div className="bg-white p-6 rounded-xl border border-slate-200">
                       <h3 className="text-sm font-bold uppercase tracking-wide mb-4 text-slate-500 flex items-center gap-2"><TrendingUp className="w-4 h-4" /> Overall Trend</h3>
                       <div className="h-64">
                          {trendData.length > 0 ? <MultiLineChart series={trendData} categories={ASSESSMENTS.map(a => a.label)} target={targetKPI} /> : <div className="h-full flex items-center justify-center text-slate-400 text-sm">No trend data available</div>}
                       </div>
                    </div>
                    <div className="bg-white p-6 rounded-xl border border-slate-200">
                       <h3 className="text-sm font-bold uppercase tracking-wide mb-4 text-slate-500 flex items-center gap-2"><PieChart className="w-4 h-4" /> Grade Distribution ({ASSESSMENTS.find(a => a.id === selectedAssessment)?.label})</h3>
                       <div className="h-64">
                          {gradeDistribution.length > 0 ? <SimplePieChart data={gradeDistribution} /> : <div className="h-full flex items-center justify-center text-slate-400 text-sm">No grades available</div>}
                       </div>
                    </div>
                 </div>

                 <div className="p-6 rounded-xl bg-slate-50 border border-slate-100 mb-8"><h3 className="text-sm font-bold uppercase tracking-wide mb-3 text-slate-500">Skill Breakdown (Avg Score)</h3><div className="space-y-3">{skillAverages.map(s => (<div key={s.id}><div className="flex justify-between text-xs mb-1"><span className="font-semibold text-slate-700">{s.skill}</span><span className="text-slate-500">{s.avg.toFixed(1)}%</span></div><div className="w-full bg-slate-200 rounded-full h-1.5 overflow-hidden"><div className={`h-full rounded-full ${s.avg < 50 ? 'bg-red-400' : (s.avg < 70 ? 'bg-yellow-400' : 'bg-green-500')}`} style={{ width: `${s.avg}%` }}></div></div></div>))}</div></div>
                 <div className="mb-8"><h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><Lightbulb className="w-5 h-5 text-yellow-500" /> Automated Strategic Insights</h3><div className="grid grid-cols-1 md:grid-cols-2 gap-6"><div className="bg-red-50 p-5 rounded-lg border border-red-100"><div className="flex items-center gap-2 mb-2"><AlertTriangle className="w-4 h-4 text-red-600" /><span className="font-bold text-red-800">Critical Issue Identified</span></div><p className="text-sm text-red-700 leading-relaxed">The weakest skill area is <strong>{weakestSkill ? weakestSkill.skill : 'N/A'}</strong> with an average of <strong>{weakestSkill ? weakestSkill.avg.toFixed(1) : 0}%</strong>. This component is significantly pulling down the overall subject grade average.</p></div><div className="bg-blue-50 p-5 rounded-lg border border-blue-100"><div className="flex items-center gap-2 mb-2"><ClipboardList className="w-4 h-4 text-blue-600" /><span className="font-bold text-blue-800">Suggested Intervention</span></div><p className="text-sm text-blue-700 leading-relaxed">{weakestSkill?.id === 'p1' && "Implement intensive reading comprehension drills focusing on skimmimg and scanning techniques. Use past year papers for Part 1-4 practice."}{weakestSkill?.id === 'p2' && "Focus on essay structures (Part 1 Email & Part 2 Essay). Conduct weekly timed writing sessions with peer review to improve vocabulary and grammar."}{weakestSkill?.id === 'p3' && "Increase oral practice frequency. Conduct mock speaking tests in pairs focusing on Part 2 (Individual turn) and Part 3 (Discussion)."}{weakestSkill?.id === 'p4' && "Use audio materials from authentic sources. Practice dictation and keyword recognition to improve listening accuracy."}</p></div></div></div>
                 <div className="border-t border-slate-200 pt-6"><h3 className="text-sm font-bold text-slate-500 uppercase mb-2">Executive Summary</h3><p className="text-sm text-slate-700 leading-relaxed text-justify">Based on the <strong>{ASSESSMENTS.find(a => a.id === selectedAssessment)?.label}</strong> assessment data, the cohort achieved a GPA of <strong>{currentAvg.toFixed(2)}%</strong> with a GPMP of <strong>{currentGPMP.toFixed(2)}</strong>. When compared against the District KPI of <strong>{targetKPI}%</strong>, the performance gap stands at <strong>{gap > 0 ? '+' : ''}{gap.toFixed(2)}%</strong>. Immediate attention should be directed towards improving <strong>{weakestSkill.skill}</strong> proficiency, as it is currently the lowest performing component. Strategic interventions listed above should be implemented immediately to ensure target alignment for the next assessment cycle.</p></div>
              </div>
            </div>
          );
        };

        const LeaderboardView = ({ data }) => {
          const [assessmentId, setAssessmentId] = useState('spmc');
          const rankings = data
            .map(s => ({ ...s, stats: getAssessmentStats(assessmentId, s.marks[assessmentId]) }))
            .filter(s => !s.stats.isEmpty && !s.stats.isTH)
            .sort((a, b) => b.stats.percentage - a.stats.percentage)
            .slice(0, 50);

          return (
            <div className="space-y-6">
              <div className="flex justify-between items-center bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                <div className="flex items-center gap-2"><Trophy className="w-6 h-6 text-yellow-500" /><h2 className="font-bold text-slate-800">District Leaderboard</h2></div>
                <select className="p-2 border rounded text-sm bg-slate-50" value={assessmentId} onChange={e => setAssessmentId(e.target.value)}>{ASSESSMENTS.map(a => <option key={a.id} value={a.id}>{a.label}</option>)}</select>
              </div>
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <table className="w-full text-sm text-left"><thead className="bg-slate-900 text-white text-xs uppercase"><tr><th className="p-4 w-16 text-center">Rank</th><th className="p-4">Student</th><th className="p-4">School / Class</th><th className="p-4 text-center">Score</th><th className="p-4 text-center">Grade</th></tr></thead><tbody className="divide-y divide-slate-100">{rankings.map((s, i) => (<tr key={s.id} className="hover:bg-slate-50"><td className="p-4 text-center font-bold text-slate-500">{i+1}</td><td className="p-4 font-medium text-slate-900">{s.name}</td><td className="p-4 text-slate-500 text-xs"><div className="font-bold text-slate-700">{s.schoolName}</div><div>{s.className}</div></td><td className="p-4 text-center"><div className="font-bold text-blue-600">{s.stats.percentage.toFixed(1)}%</div></td><td className="p-4 text-center"><span className={`px-2 py-1 rounded text-xs font-bold text-white`} style={{ backgroundColor: GRADE_THRESHOLDS.find(g => g.grade === s.stats.grade)?.color || '#999' }}>{s.stats.grade}</span></td></tr>))}</tbody></table>
              </div>
            </div>
          );
        };

        // --- FIXED DATA EXPORT VIEW ---
        // This component now receives the FULL dataset ('data') regardless of tab selection
        // and calculates its own 'availableClasses' based on the school filter.
        
        const DataExportView = ({ data, role }) => {
          const [filterSchool, setFilterSchool] = useState('All');
          const [filterClass, setFilterClass] = useState('All');
          const [filterGrade, setFilterGrade] = useState([]);
          const [filterMinMark, setFilterMinMark] = useState('');
          const [filterMaxMark, setFilterMaxMark] = useState('');
          const [targetAssessment, setTargetAssessment] = useState('spmc');

          // 1. Get Unique Schools (For Admin Filter)
          const schools = useMemo(() => ['All', ...new Set(data.map(d => d.schoolName))].sort(), [data]);

          // 2. Get Unique Classes (Dynamic based on selected School)
          const availableClasses = useMemo(() => {
              let relevantData = data;
              // If Admin filters by school, narrow down the classes list
              if (filterSchool !== 'All') {
                  relevantData = data.filter(d => d.schoolName === filterSchool);
              }
              // Return unique classes found in the (filtered) dataset
              return ['All', ...new Set(relevantData.map(d => d.className))].sort();
          }, [data, filterSchool]);

          const toggleGrade = (grade) => {
            setFilterGrade(prev => prev.includes(grade) ? prev.filter(g => g !== grade) : [...prev, grade]);
          };

          const filtered = data.filter(s => {
            // School Filter (Admin Only)
            if (filterSchool !== 'All' && s.schoolName !== filterSchool) return false;

            // Class Filter
            if (filterClass !== 'All' && s.className !== filterClass) return false;
            
            const stats = getAssessmentStats(targetAssessment, s.marks[targetAssessment]);
            
            // Grade Filter
            if (filterGrade.length > 0 && !filterGrade.includes(stats.grade)) return false;

            // Mark Range Filter
            const mark = stats.percentage;
            const min = filterMinMark === '' ? 0 : parseFloat(filterMinMark);
            const max = filterMaxMark === '' ? 100 : parseFloat(filterMaxMark);
            if (mark < min || mark > max) return false;

            return true;
          });

          const handleExport = () => {
            const headers = ["Name", "Class", "School", "Assessment", "Score", "Grade", "Reading", "Writing", "Speaking", "Listening"];
            const rows = filtered.map(s => {
              const stats = getAssessmentStats(targetAssessment, s.marks[targetAssessment]);
              const m = s.marks[targetAssessment] || {};
              return [
                s.name, s.className, s.schoolName, targetAssessment.toUpperCase(), 
                stats.percentage.toFixed(2), stats.grade,
                m.p1 || '-', m.p2 || '-', m.p3 || '-', m.p4 || '-'
              ];
            });
            const csvContent = [headers.join(","), ...rows.map(r => r.join(","))].join("\n");
            downloadCSV(csvContent, "Student_Data_Export.csv");
          };

          return (
            <div className="space-y-6 animate-in fade-in">
              <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm space-y-6">
                 <div className="flex flex-wrap gap-6 items-end">
                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Target Assessment</label>
                      <select className="p-2 border rounded-lg text-sm min-w-[150px]" value={targetAssessment} onChange={e => setTargetAssessment(e.target.value)}>
                        {ASSESSMENTS.map(a => <option key={a.id} value={a.id}>{a.label}</option>)}
                      </select>
                    </div>

                    {/* School Filter (Visible only for Admin) */}
                    {role === 'admin' && (
                        <div>
                          <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Filter School</label>
                          <select className="p-2 border rounded-lg text-sm min-w-[150px]" value={filterSchool} onChange={e => { setFilterSchool(e.target.value); setFilterClass('All'); }}>
                            {schools.map(s => <option key={s} value={s}>{s === 'All' ? 'All Schools' : s}</option>)}
                          </select>
                        </div>
                    )}

                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Filter Class</label>
                      <select className="p-2 border rounded-lg text-sm min-w-[150px]" value={filterClass} onChange={e => setFilterClass(e.target.value)}>
                        {availableClasses.map(c => <option key={c} value={c}>{c === 'All' ? 'All Classes' : c}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Mark Range (%)</label>
                      <div className="flex items-center gap-2">
                         <input className="w-16 p-2 border rounded text-sm text-center" placeholder="0" value={filterMinMark} onChange={e => setFilterMinMark(e.target.value)} />
                         <span className="text-slate-400">-</span>
                         <input className="w-16 p-2 border rounded text-sm text-center" placeholder="100" value={filterMaxMark} onChange={e => setFilterMaxMark(e.target.value)} />
                      </div>
                    </div>
                 </div>
                 <div>
                   <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Filter Grades</label>
                   <div className="flex flex-wrap gap-2">
                     {GRADE_THRESHOLDS.map(g => (
                       <button 
                         key={g.grade} 
                         onClick={() => toggleGrade(g.grade)}
                         className={`px-3 py-1 text-xs rounded-full border transition-all ${filterGrade.includes(g.grade) ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 border-slate-200'}`}
                       >
                         {g.grade}
                       </button>
                     ))}
                   </div>
                 </div>
                 <div className="flex justify-between items-center pt-4 border-t border-slate-100">
                   <div className="text-sm text-slate-500">Found <strong>{filtered.length}</strong> matching records</div>
                   <button onClick={handleExport} className="flex items-center gap-2 bg-green-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-green-700 transition-colors">
                     <FileSpreadsheet className="w-4 h-4" /> Export Filtered Data
                   </button>
                 </div>
              </div>
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="overflow-x-auto max-h-[500px]">
                  <table className="w-full text-sm text-left">
                     <thead className="bg-slate-50 text-xs uppercase text-slate-500 sticky top-0">
                       <tr><th className="p-3">Name</th><th className="p-3">Class</th><th className="p-3">School</th><th className="p-3 text-center">Score</th><th className="p-3 text-center">Grade</th></tr>
                     </thead>
                     <tbody className="divide-y divide-slate-100">
                       {filtered.map(s => {
                         const stats = getAssessmentStats(targetAssessment, s.marks[targetAssessment]);
                         return (
                           <tr key={s.id} className="hover:bg-slate-50">
                             <td className="p-3 font-medium text-slate-900">{s.name}</td>
                             <td className="p-3 text-slate-500">{s.className}</td>
                             <td className="p-3 text-slate-500 text-xs">{s.schoolName}</td>
                             <td className="p-3 text-center font-bold text-blue-600">{stats.percentage.toFixed(1)}%</td>
                             <td className="p-3 text-center"><span className={`px-2 py-0.5 rounded text-[10px] font-bold text-white`} style={{ backgroundColor: GRADE_THRESHOLDS.find(g => g.grade === stats.grade)?.color || '#ccc' }}>{stats.grade}</span></td>
                           </tr>
                         );
                       })}
                     </tbody>
                  </table>
                </div>
              </div>
            </div>
          );
        };

        const LoginScreen = ({ onLogin }) => {
          const [school, setSchool] = useState('');
          const [passcode, setPasscode] = useState('');
          const [mode, setMode] = useState('teacher');

          return (
            <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
              <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
                <div className="flex justify-center mb-6">
                  <div className="bg-blue-600 p-3 rounded-xl shadow-lg shadow-blue-200"><TrendingUp className="w-8 h-8 text-white" /></div>
                </div>
                <h2 className="text-2xl font-bold text-center text-slate-800 mb-2">English Data Centre</h2>
                <p className="text-center text-slate-500 mb-8 text-sm">SPM 1119 Progress Monitoring System</p>
                <div className="flex bg-slate-100 p-1 rounded-lg mb-6">
                  <button onClick={() => setMode('teacher')} className={`flex-1 py-2 text-sm font-medium rounded-md transition-all ${mode === 'teacher' ? 'bg-white shadow text-blue-700' : 'text-slate-500 hover:text-slate-700'}`}>Teacher Access</button>
                  <button onClick={() => setMode('admin')} className={`flex-1 py-2 text-sm font-medium rounded-md transition-all ${mode === 'admin' ? 'bg-white shadow text-blue-700' : 'text-slate-500 hover:text-slate-700'}`}>Admin Access</button>
                </div>
                {mode === 'teacher' ? (
                  <div className="space-y-4">
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">School Name</label>
                      <div className="relative">
                        <School className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
                        <input type="text" value={school} onChange={(e) => setSchool(e.target.value)} className="w-full pl-9 p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="e.g. SMK Maju Jaya" />
                      </div>
                    </div>
                    <button onClick={() => school && onLogin('teacher', school)} disabled={!school.trim()} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-medium transition-colors disabled:opacity-50">Enter Dashboard</button>
                  </div>
                ) : (
                  <div className="space-y-4">
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Admin Passcode</label>
                      <div className="relative">
                        <Shield className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
