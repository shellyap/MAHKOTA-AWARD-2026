                        <input type="password" value={passcode} onChange={(e) => setPasscode(e.target.value)} className="w-full pl-9 p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="Enter passcode" />
                      </div>
                    </div>
                    <button onClick={() => passcode === 'admin' ? onLogin('admin') : alert('Invalid Passcode (Try: admin)')} disabled={!passcode} className="w-full bg-slate-900 hover:bg-slate-800 text-white py-3 rounded-xl font-medium transition-colors disabled:opacity-50">Access District Panel</button>
                  </div>
                )}
              </div>
            </div>
          );
        };

        const MainApp = ({ data, session, db, appId }) => {
          const [activeTab, setActiveTab] = useState(session.role === 'admin' ? 'global' : 'master');
          const [targetKPI, setTargetKPI] = useState(70); 
          const [targetGPMP, setTargetGPMP] = useState(4.5); 
          
          // Manage custom classes state
          const [manualClasses, setManualClasses] = useState([]);
          const [isManagingClasses, setIsManagingClasses] = useState(false);
          const [newClassName, setNewClassName] = useState('');

          // Combine derived classes with manually added ones
          const uniqueGroups = useMemo(() => {
            if (session.role === 'admin') return [...new Set(data.map(d => d.schoolName))].sort();
            
            const derivedClasses = [...new Set(data.map(d => d.className))];
            const combined = [...new Set([...derivedClasses, ...manualClasses])].sort();
            return combined;
          }, [data, session.role, manualClasses]);
          
          const [currentGroup, setCurrentGroup] = useState('Class A');

          // Load manual classes from Firestore on init
          useEffect(() => {
            if (!db) return;
            const fetchClasses = async () => {
               const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'class_metadata'), where('schoolName', '==', session.schoolName));
               const unsubscribe = onSnapshot(q, (snapshot) => {
                 const loadedClasses = snapshot.docs.map(doc => doc.data().className);
                 setManualClasses(loadedClasses);
               });
               return () => unsubscribe();
            };
            
            if (session.role === 'teacher') {
               fetchClasses();
            }
          }, [session.role, session.schoolName, db, appId]);


          const handleClassChange = (e) => {
            const value = e.target.value;
            if (value === '__NEW__') {
              const name = prompt("Enter new class name:");
              if (name) {
                  addManualClass(name);
              }
            } else {
              setCurrentGroup(value);
            }
          };

          // Initialize current group if empty
          useEffect(() => {
            if (uniqueGroups.length > 0 && !uniqueGroups.includes(currentGroup)) {
               if (currentGroup === 'Class A' && !manualClasses.includes('Class A')) {
                  setCurrentGroup(uniqueGroups[0]);
               }
            }
          }, [uniqueGroups]);

          const addManualClass = async (name = newClassName) => {
            if (name && !manualClasses.includes(name)) {
              if (db) {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'class_metadata'), {
                   schoolName: session.schoolName,
                   className: name,
                   createdAt: new Date().toISOString()
                });
              }
              setNewClassName('');
              setCurrentGroup(name);
            }
          };

          const removeManualClass = async (cls) => {
            if (confirm(`Remove ${cls} from list? (Student data remains)`)) {
               if (db) {
                   const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'class_metadata'), where('schoolName', '==', session.schoolName), where('className', '==', cls));
                   const snapshot = await getDocs(q);
                   snapshot.forEach(async (doc) => {
                       await deleteDoc(doc.ref);
                   });
               }
               if (currentGroup === cls) setCurrentGroup(uniqueGroups[0] || 'Class A');
            }
          };

          const onBulkImport = async (studentsToImport) => {
            if (!db) return;

            // Fetch existing students in this specific class to prevent duplicates
            const existingStudents = data.filter(d => d.className === currentGroup && d.schoolName === session.schoolName);
            
            let newCount = 0;
            let updateCount = 0;
            const batch = writeBatch(db);
            
            studentsToImport.forEach(newStudent => {
              const match = existingStudents.find(existing => existing.name.toLowerCase() === newStudent.name.toLowerCase());
              
              if (match) {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'student_records', match.id);
                const mergedMarks = { ...match.marks };
                Object.keys(newStudent.marks).forEach(assessmentId => {
                  if (!mergedMarks[assessmentId]) mergedMarks[assessmentId] = {};
                  Object.assign(mergedMarks[assessmentId], newStudent.marks[assessmentId]);
                });
                batch.update(docRef, { marks: mergedMarks });
                updateCount++;
              } else {
                const newRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'student_records'));
                batch.set(newRef, {
                  ...newStudent,
                  className: currentGroup,
                  schoolName: session.schoolName,
                  createdAt: new Date().toISOString()
                });
                newCount++;
              }
            });

            try {
              await batch.commit();
              alert(`Import Successful!\nAdded: ${newCount} New Students\nUpdated: ${updateCount} Existing Records`);
            } catch (e) {
              console.error("Batch commit failed", e);
              alert("Error importing data. Please try again.");
            }
          };

          const addStudent = async (studentData) => {
            // Single add wrapper
            onBulkImport([studentData]);
          };

          const updateStudentMark = async (id, assessmentId, key, value) => {
            if (!db) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'student_records', id);
            try {
              // Use dot notation for nested update to avoid overwriting other fields
              await updateDoc(docRef, { [`marks.${assessmentId}.${key}`]: value });
            } catch (e) {
               // Fallback if nested field doesn't exist
               const student = data.find(s => s.id === id);
               if (student) {
                 const newMarks = { ...student.marks };
                 if (!newMarks[assessmentId]) newMarks[assessmentId] = {};
                 newMarks[assessmentId][key] = value;
                 await setDoc(docRef, { marks: newMarks }, { merge: true });
               }
            }
          };

          const deleteStudent = async (id) => {
            if (!db) return;
            if (confirm("Delete this student record?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'student_records', id));
          };

          const filteredData = useMemo(() => {
            if (session.role === 'admin') return data; 
            return data.filter(d => d.className === currentGroup);
          }, [data, currentGroup, session.role]);

          // IMPORTANT: UNFILTERED DATA FOR EXPORT TAB
          // This ensures the export tab receives ALL data for the school (or district), 
          // NOT just the currently selected class from the top menu.
          const exportAllData = useMemo(() => {
             return session.role === 'admin' ? data : data.filter(d => d.schoolName === session.schoolName);
          }, [data, session.role, session.schoolName]);

          return (
            <div className="min-h-screen bg-slate-100 font-sans text-slate-800 flex flex-col">
              <nav className="bg-slate-900 text-white shadow-lg z-50 print:hidden">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between h-16 items-center">
                    <div className="flex items-center gap-3">
                      <div className="bg-blue-600 p-2 rounded-lg"><TrendingUp className="w-6 h-6 text-white" /></div>
                      <div>
                        <h1 className="text-lg font-bold leading-tight">English Progress Tracker</h1>
                        <p className="text-xs text-slate-400">{session.role === 'admin' ? 'District Data Centre' : `${session.schoolName} Dashboard`}</p>
                      </div>
                    </div>
                    <div className="flex items-center gap-4">
                      {/* Class Selection - Only for Teacher & Only relevant for Master/Analysis tabs */}
                      {session.role === 'teacher' && (
                        <div className="flex items-center gap-2">
                          <span className="text-xs text-slate-400 uppercase font-bold hidden md:inline">Class:</span>
                          <select value={currentGroup} onChange={handleClassChange} className="bg-slate-800 text-white text-xs px-2 py-1 rounded border border-slate-700 max-w-[120px]">
                            {uniqueGroups.length === 0 && <option>Class A</option>}
                            {uniqueGroups.map(c => <option key={c} value={c}>{c}</option>)}
                            {!uniqueGroups.includes(currentGroup) && <option value={currentGroup}>{currentGroup}</option>}
                            <option value="__NEW__">+ New Class</option>
                          </select>
                          <button 
                            onClick={() => setIsManagingClasses(!isManagingClasses)}
                            className={`p-1.5 rounded-md transition-colors ${isManagingClasses ? 'bg-blue-500 text-white' : 'hover:bg-slate-800 text-slate-400'}`}
                            title="Manage Classes"
                          >
                            <Settings className="w-4 h-4" />
                          </button>
                        </div>
                      )}

                      <span className="text-sm text-slate-400 hidden md:inline-block">|</span>
                      <button onClick={() => { /* Logout logic passed from parent */ }} className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-lg text-xs font-medium transition-colors border border-slate-700"><LogOut className="w-3 h-3" /> Logout</button>
                    </div>
                  </div>
                  
                  {/* Navigation Tabs */}
                  <div className="flex space-x-1 overflow-x-auto no-scrollbar pb-2">
                       {session.role === 'teacher' && (
                         <>
                           <TabButton id="master" label="1. Master Data" active={activeTab} set={setActiveTab} />
                           <TabButton id="personal" label="2. Student Progress" active={activeTab} set={setActiveTab} />
                           <TabButton id="analysis" label="3. Class Analysis" active={activeTab} set={setActiveTab} />
                         </>
                       )}
                       <TabButton id="global" label="4. Global Analysis" active={activeTab} set={setActiveTab} />
                       <TabButton id="leaderboard" label="5. Leaderboard" active={activeTab} set={setActiveTab} />
                       <TabButton id="kpi" label="6. KPI & Reports" active={activeTab} set={setActiveTab} />
                       <TabButton id="export" label="7. Data Export" active={activeTab} set={setActiveTab} />
                  </div>
                </div>
              </nav>

              {isManagingClasses && (
                <div className="bg-slate-50 border-b border-slate-200 p-4 animate-in slide-in-from-top-2">
                  <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <h3 className="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
                      <School className="w-4 h-4 text-blue-500" /> Class Manager
                    </h3>
                    <div className="flex gap-2 mb-3">
                      <input 
                        className="p-2 text-sm border border-slate-300 rounded w-64"
                        placeholder="New Class Name (e.g. 5 Beta)"
                        value={newClassName}
                        onChange={e => setNewClassName(e.target.value)}
                      />
                      <button onClick={() => addManualClass(newClassName)} disabled={!newClassName.trim()} className="bg-blue-600 text-white px-4 py-2 rounded text-sm font-medium hover:bg-blue-700 disabled:opacity-50">Add Class</button>
                    </div>
                    <div className="flex flex-wrap gap-2">
                      {uniqueGroups.map(cls => (
                        <div key={cls} className="bg-white border border-slate-200 px-3 py-1 rounded-full text-xs flex items-center gap-2">
                          {cls}
                          <button onClick={() => removeManualClass(cls)} className="text-slate-400 hover:text-red-500"><X className="w-3 h-3" /></button>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              <div className="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
                 {activeTab === 'master' && <MasterView data={filteredData} currentClass={currentGroup} onBulkImport={onBulkImport} onUpdate={updateStudentMark} onDelete={deleteStudent} setCurrentClass={setCurrentGroup} role={session.role} />}
                 {activeTab === 'personal' && <PersonalView data={filteredData} onDelete={deleteStudent} onUpdate={updateStudentMark} />}
                 {activeTab === 'analysis' && <ClassAnalysisView data={filteredData} title={`Class ${currentGroup}`} />}
                 {activeTab === 'global' && <GlobalAnalysisView data={data} session={session} targetKPI={targetKPI} setTargetKPI={setTargetKPI} targetGPMP={targetGPMP} setTargetGPMP={setTargetGPMP} manualClasses={manualClasses} />}
                 {activeTab === 'leaderboard' && <LeaderboardView data={data} />}
                 {activeTab === 'kpi' && <KPIReportView data={filteredData} targetKPI={targetKPI} setTargetKPI={setTargetKPI} targetGPMP={targetGPMP} setTargetGPMP={setTargetGPMP} />}
                 
                 {/* CRITICAL FIX: Pass exportAllData (which contains ALL students for the school/district) 
                     instead of filteredData (which only contains students for the currently selected class in top menu). 
                     Also, pass 'data' prop to DataExportView so it can derive its own full class list. */}
                 {activeTab === 'export' && <DataExportView data={exportAllData} role={session.role} classes={uniqueGroups} />}
              </div>
            </div>
          );
        };

        const TabButton = ({ id, label, active, set }) => (
          <button onClick={() => set(id)} className={`px-4 py-2 text-xs font-bold uppercase tracking-wide border-b-2 transition-colors whitespace-nowrap ${active === id ? 'border-blue-400 text-white bg-slate-800/50' : 'border-transparent text-slate-400 hover:text-white hover:bg-slate-800/30'}`}>{label}</button>
        );

        // --- 4. MAIN EXPORT ---

        function EnglishProgressTracker() {
          const [user, setUser] = useState(null);
          const [session, setSession] = useState({ role: null, schoolName: '' }); 
          const [loading, setLoading] = useState(true);
          const [allData, setAllData] = useState([]);
          
          useEffect(() => {
            const initAuth = async () => {
              if (globalAuth) {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await signInWithCustomToken(globalAuth, __initial_auth_token);
                } else {
                  await signInAnonymously(globalAuth);
                }
              } else {
                setLoading(false);
              }
            };
            initAuth();
            
            if (globalAuth) {
              const unsubscribe = onAuthStateChanged(globalAuth, (u) => {
                setUser(u);
                setLoading(false);
              });
              return () => unsubscribe();
            }
          }, []);

          useEffect(() => {
            if (!user || !globalDb) return;
            const q = query(collection(globalDb, 'artifacts', globalAppId, 'public', 'data', 'student_records'));
            const unsubscribe = onSnapshot(q, (snapshot) => {
              const records = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              setAllData(records);
            });
            return () => unsubscribe();
          }, [user]);

          const handleLogin = (role, schoolName = '') => setSession({ role, schoolName });
          const handleLogout = () => setSession({ role: null, schoolName: '' });

          if (loading) return <div className="min-h-screen flex items-center justify-center bg-slate-100 text-slate-500">Loading Database...</div>;
          if (!session.role) return <LoginScreen onLogin={handleLogin} />;

          const viewableData = session.role === 'admin' ? allData : allData.filter(d => d.schoolName === session.schoolName);

          // We pass handleLogout down to MainApp via props or just render MainApp inside this layout wrapper
          // For simplicity in this single-file, we'll render the MainApp logic directly inside here or pass props.
          // To match the previous MainApp structure, I've moved the Navigation INTO MainApp component above for cleaner state access.
          // Wait, I moved Nav inside MainApp in the code block above to access 'currentGroup' state. 
          
          return (
             <MainApp data={viewableData} session={session} db={globalDb} appId={globalAppId} />
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<EnglishProgressTracker />);
    </script>
</body>
</html>
