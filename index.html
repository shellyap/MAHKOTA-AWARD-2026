      // Firebase Authentication Hook
      useEffect(() => {

            setSyncStatus('Offline');

        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (u) => {
          setUser(u);

      // Real-time Database Synchronizers
      useEffect(() => {
        if (!user) return;

        const dataRef = collection(db, 'artifacts', appId, 'public', 'data', 'recipients');

              addToast("Akses pangkalan data dihalang. Sila kemas kini Firestore Rules.", "reset");

              setSyncStatus('Error');

          }
        );

        // Listen to Categories Config

              const rawData = doc.data();
              let parsedData = {};

                parsedData = typeof rawData.data === 'string' ? JSON.parse(rawData.data) : (rawData.data || {});
              } catch (e) {
                console.error("Error parsing feedback JSON:", e);
                parsedData = rawData.data || {};
              }
              return { id: doc.id, ...parsedData, submittedAt: rawData.submittedAt };
            }).filter(item => {

            });

          },

      // ADVANCED DATA ANALYSIS: Participant Category Breakdown
      const participantsProfile = useMemo(() => {

          "Pengetua / Guru Besar": 0,
          "Pegawai PPD / Staf Sokongan": 0,

            counts[category]++;

        const total = Object.values(counts).reduce((acc, curr) => acc + curr, 0);

            name,
            count,
            percentage: total > 0 ? Math.round((count / total) * 100) : 0
          }))
          .sort((a, b) => b.count - a.count);

      // Derived Statistics for Dashboard

        const counts = CEREMONIES.reduce((acc, curr) => {
          acc[curr.id] = 0;
          return acc;

        recipients.forEach(r => {
          if (counts[r.ceremony] !== undefined) {
            counts[r.ceremony]++;
          }
        });
        return counts;

          return {
            id: c.id,
            name: c.name,
            count,
            percentage: Math.round(pct * 100),

        const list = [];
        
        CEREMONIES.forEach(c => {
          const currentCount = stats[c.id] || 0;
          const ratio = currentCount / c.quota;
          if (ratio >= 0.9 && ratio < 1) {
            list.push({
              id: `warn-${c.id}`,
              type: 'warning',
              text: `Majlis ${c.name} hampir mencapai kuota! (${currentCount}/${c.quota} slots diisi).`
            });
          } else if (currentCount > c.quota) {
            list.push({
              id: `crit-${c.id}`,
              type: 'critical',
              text: `Majlis ${c.name} telah melebihi had kuota maksimum! (${currentCount}/${c.quota}).`
            });
          }
        });

        const totalCats = Object.keys(categories).reduce((sum, key) => sum + categories[key].length, 0);
        const filledCats = Object.keys(categories).reduce((sum, key) => {
          return sum + categories[key].filter(cat => recipients.some(r => r.category === cat)).length;
        }, 0);
        const emptyCatsCount = totalCats - filledCats;

        if (emptyCatsCount > 0) {
          list.push({
            id: 'empty-categories',
            type: 'info',
            text: `Terdapat ${emptyCatsCount} kategori anugerah yang masih kosong tanpa sebarang pencalonan.`
          });
        }

        const formatViolators = recipients.filter(r => {
          const normalized = r.icNumber.replace(/[^0-9]/g, '');
          return normalized.length !== 12;
        });
        if (formatViolators.length > 0) {
          list.push({
            id: 'ic-check',
            type: 'warning',
            text: `Kesan ${formatViolators.length} format No. Kad Pengenalan tidak mengikut format piawai 12-digit.`
          });
        }

        if (list.length === 0) {
          list.push({
            id: 'ok-status',
            type: 'success',
            text: 'Semua kemasukan data berada dalam keadaan teratur. Sedia untuk dieksport.'
          });
        }

        return list;
      }, [stats, categories, recipients]);

      const recentRecipients = useMemo(() => {
        return [...recipients]
          .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0))
          .slice(0, 5);
      }, [recipients]);

      // FEEDBACK MULTI-DIMENSIONAL STATISTICS COMPUTATIONS
      const feedbackStats = useMemo(() => {
        const total = activeFeedbacks.length;
        if (total === 0) {
          return {
            total: 0,
            overallAverage: 0,
            logistikAvg: 0,
            protokolAvg: 0,
            pengisianAvg: 0,
            questionBreakdown: {}
          };
        }

        const defaultBreakdown = {
          logistik_pendaftaran: { key: 'logistik', subKey: 'pendaftaran', label: 'Urusan Pendaftaran', scores: [0,0,0,0,0], sum: 0, count: 0 },
          logistik_kemudahan: { key: 'logistik', subKey: 'kemudahan', label: 'Kemudahan & Tempat Dewan', scores: [0,0,0,0,0], sum: 0, count: 0 },
          logistik_siaraya: { key: 'logistik', subKey: 'siaraya', label: 'Sistem Siaraya / Publisiti', scores: [0,0,0,0,0], sum: 0, count: 0 },
          logistik_makanan: { key: 'logistik', subKey: 'makanan', label: 'Kualiti Makanan & Jamuan', scores: [0,0,0,0,0], sum: 0, count: 0 },
          protokol_masa: { key: 'protokol', subKey: 'masa', label: 'Ketepatan Masa Tentatif', scores: [0,0,0,0,0], sum: 0, count: 0 },
          protokol_aliran: { key: 'protokol', subKey: 'aliran', label: 'Aliran Kelancaran Majlis', scores: [0,0,0,0,0], sum: 0, count: 0 },
          protokol_emcee: { key: 'protokol', subKey: 'emcee', label: 'Gaya Urus Setia & Pengacaraan', scores: [0,0,0,0,0], sum: 0, count: 0 },
          pengisian_relevansi: { key: 'pengisian', subKey: 'relevansi', label: 'Relevansi Kategori Anugerah', scores: [0,0,0,0,0], sum: 0, count: 0 },
          pengisian_impak: { key: 'pengisian', subKey: 'impak', label: 'Impak & Nilai Penghargaan', scores: [0,0,0,0,0], sum: 0, count: 0 },
        };

        let logistikSum = 0, logistikCount = 0;
        let protokolSum = 0, protokolCount = 0;
        let pengisianSum = 0, pengisianCount = 0;

        activeFeedbacks.forEach(f => {
          if (f.logistik) {
            const keys = ['pendaftaran', 'kemudahan', 'siaraya', 'makanan'];
            keys.forEach(k => {
              const val = parseInt(f.logistik[k]);
              if (!isNaN(val) && val >= 1 && val <= 5) {
                const breakdownKey = `logistik_${k}`;
                defaultBreakdown[breakdownKey].scores[val - 1]++;
                defaultBreakdown[breakdownKey].sum += val;
                defaultBreakdown[breakdownKey].count++;
                logistikSum += val;
                logistikCount++;
              }
            });
          }
          if (f.protokol) {
            const keys = ['masa', 'aliran', 'emcee'];
            keys.forEach(k => {
              const val = parseInt(f.protokol[k]);
              if (!isNaN(val) && val >= 1 && val <= 5) {
                const breakdownKey = `protokol_${k}`;
                defaultBreakdown[breakdownKey].scores[val - 1]++;
                defaultBreakdown[breakdownKey].sum += val;
                defaultBreakdown[breakdownKey].count++;
                protokolSum += val;
                protokolCount++;
              }
            });
          }
          if (f.pengisian) {
            const keys = ['relevansi', 'impak'];
            keys.forEach(k => {
              const val = parseInt(f.pengisian[k]);
              if (!isNaN(val) && val >= 1 && val <= 5) {
                const breakdownKey = `pengisian_${k}`;
                defaultBreakdown[breakdownKey].scores[val - 1]++;
                defaultBreakdown[breakdownKey].sum += val;
                defaultBreakdown[breakdownKey].count++;
                pengisianSum += val;
                pengisianCount++;
              }
            });
          }
        });

        const overallSum = logistikSum + protokolSum + pengisianSum;
        const overallCount = logistikCount + protokolCount + pengisianCount;

        return {
          total,
          overallAverage: overallCount > 0 ? (overallSum / overallCount).toFixed(2) : 0,
          logistikAvg: logistikCount > 0 ? (logistikSum / logistikCount).toFixed(2) : 0,
          protokolAvg: protokolCount > 0 ? (protokolSum / protokolCount).toFixed(2) : 0,
          pengisianAvg: pengisianCount > 0 ? (pengisianSum / pengisianCount).toFixed(2) : 0,
          questionBreakdown: defaultBreakdown
        };
      }, [activeFeedbacks]);

      const filteredComments = useMemo(() => {
        return activeFeedbacks.filter(f => {
          const query = searchFeedbackQuery.toLowerCase();
          const matchesKekuatan = f.kekuatan ? f.kekuatan.toLowerCase().includes(query) : false;
          const matchesPenambahbaikan = f.penambahbaikan ? f.penambahbaikan.toLowerCase().includes(query) : false;
          return matchesKekuatan || matchesPenambahbaikan;

      const handleDraftChange = (category, field, value) => {

          return;

        const proceedWithSave = async () => {
          const newId = Date.now().toString();
          const newRecipient = {
            id: newId,
            ceremony: ceremonyId,
            category: category,
            salutation: draft.salutation || 'Encik',
            fullName: draft.fullName,
            icNumber: draft.icNumber,
            schoolUnit: draft.schoolUnit,
            pic: draft.pic,
            createdAt: Date.now(),
            createdBy: user?.uid || 'unknown'
          };

          try {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'recipients', newId);
            await setDoc(docRef, newRecipient);

            setDrafts(prev => ({
              ...prev,
              [category]: {
                salutation: draft.salutation || 'Encik',
                fullName: '',
                icNumber: '',
                schoolUnit: '',
                pic: draft.pic
              }
            }));
          } catch (err) {
            console.error("Error saving data:", err);
            showAlert("Ralat", "Gagal menyimpan data. Sila semak sambungan internet anda.");
          }
        };

        const currentCount = stats[ceremonyId] || 0;
        const quota = CEREMONIES.find(c => c.id === ceremonyId).quota;
        
        if (currentCount >= quota) {
          showConfirm(
            "Amaran Kuota Penuh",

      const handleAddCategoryConfig = (ceremonyId) => {

          try {
            const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'categories_config');
            await setDoc(configRef, { categories: updatedCategories });
          } catch (err) {
            console.error("Error deleting category:", err);
            showAlert("Ralat", "Gagal memadam kategori.");
          }

      };

      const exportToCSV = (ceremonyId) => {
        const filtered = ceremonyId === 'all' 
          ? recipients 
          : recipients.filter(r => r.ceremony === ceremonyId);
        
        if (filtered.length === 0) {
          showAlert("Tiada Data", "Tiada rekod setakat ini untuk dieksport.");
          return;
        }

        const headers = ['No.', 'Salutation', 'Full Name (IC)', 'IC Number', 'Name of School / Unit', 'Award Category', 'Ceremony', 'PIC / Sector'];
        
        const rows = filtered.map((r, index) => [
          index + 1,
          `"${r.salutation}"`,
          `"${r.fullName}"`,
          `"${r.icNumber}"`,
          `"${r.schoolUnit}"`,
          `"${r.category}"`,
          `"${CEREMONIES.find(c => c.id === r.ceremony)?.name || r.ceremony}"`,
          `"${r.pic}"`
        ]);

        const csvContent = [headers.join(','), ...rows.map(e => e.join(','))].join('\n');
        
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `Recipients_${ceremonyId === 'all' ? 'All' : ceremonyId.toUpperCase()}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

            error: ''
          }));

          }));
        }

      const executePurgeDatabase = async () => {
        setResetState(prev => ({ ...prev, step: 'deleting', error: '' }));
        try {
          setSyncStatus('Clearing...');
          
          const feedbackColRef = collection(db, 'artifacts', appId, 'public', 'data', 'feedback');
          const querySnapshot = await getDocs(feedbackColRef);
          
          const deletePromises = [];
          querySnapshot.forEach((document) => {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'feedback', document.id);
            deletePromises.push(deleteDoc(docRef));
          });
          
          await Promise.all(deletePromises);
          
          setUseSimulationData(false);
          setSyncStatus('Live');
          
          setResetState(prev => ({
            ...prev,
            step: 'success'
          }));
        } catch (err) {
          console.error("Purge failure:", err);
          setSyncStatus('Error');
          setResetState(prev => ({
            ...prev,
            step: 'error',
            error: `Ralat penyambungan server: ${err.message || 'Sila semak Firestore rules.'}`
          }));
        }
      };

      const closeResetModal = () => {
        setResetState({
          isOpen: false,
          step: 'password',
          passwordInput: '',
          error: ''
        });
      };

      // ----------------------------------------------------------------------
      // 👑 PROGRESS TRACKER REACT METHODS
      // ----------------------------------------------------------------------
      const trackerMetrics = useMemo(() => {
        let totalTasks = COMMITTEES_DATA.length * 3; 
        let completedTasks = 0;
        let fullyCompletedUnits = 0;

        COMMITTEES_DATA.forEach(item => {
          const state = progressTracker[item.id] || { f1: false, f2: false, f3: false };
          let count = 0;
          if (state.f1) count++;
          if (state.f2) count++;
          if (state.f3) count++;
          completedTasks += count;
          if (count === 3) {
            fullyCompletedUnits++;
          }
        });

        return {
          totalTasks,
          completedTasks,
          percent: totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0,
          fullyCompletedUnits,
          pendingUnits: COMMITTEES_DATA.length - fullyCompletedUnits
        };
      }, [progressTracker]);

      const toggleTrackerTask = (id, fasaKey) => {
        const currentData = progressTracker[id] || { f1: false, f2: false, f3: false };
        const initialCount = (currentData.f1 ? 1 : 0) + (currentData.f2 ? 1 : 0) + (currentData.f3 ? 1 : 0);
        
        const updated = {
          ...progressTracker,
          [id]: {
            ...currentData,
            [fasaKey]: !currentData[fasaKey]
          }
        };

        setProgressTracker(updated);

        const newCount = (updated[id].f1 ? 1 : 0) + (updated[id].f2 ? 1 : 0) + (updated[id].f3 ? 1 : 0);
        
        if (newCount === 3 && initialCount < 3) {
          const commName = COMMITTEES_DATA.find(c => c.id === id).title;
          addToast(`👑 ${commName} telah mencapai kesediaan operasi 100%!`, 'congrats');

        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);

          const count = (state.f1 ? 1 : 0) + (state.f2 ? 1 : 0) + (state.f3 ? 1 : 0);
          const isCompleted = count === 3;

          if (trackerStatus === 'complete') matchStatus = isCompleted;
          if (trackerStatus === 'incomplete') matchStatus = !isCompleted;

          const matchSearch = !searchValue ||

            item.pic.toLowerCase().includes(searchValue) || 
            item.desc.toLowerCase().includes(searchValue);

        });

      // ----------------------------------------------------------------------

        const filledCatsCount = Object.keys(categories).reduce((sum, key) => {

                      <AlertTriangle className="w-5 h-5" />
                      Sila Sahkan Tindakan Anda
                    </h3>
                    <p className="text-slate-600 text-sm mb-6 leading-relaxed">
                      Adakah anda benar-benar pasti? Tindakan ini akan memadam keseluruhan rekod maklum balas secara kekal di pelayan awan. Tindakan ini <span className="font-extrabold text-red-600">tidak boleh dibatalkan</span>.
                    </p>

                    <div className="flex justify-end gap-3 border-t border-slate-100 pt-4">
                      <button 
                        onClick={closeResetModal}
                        className="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg text-sm transition-all"
                      >
                        Batal
                      </button>
                      <button 
                        onClick={executePurgeDatabase}
                        className="px-5 py-2 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg text-sm shadow-md transition-all active:scale-95"
                      >
                        Ya, Padam Semua Rekod
                      </button>
                    </div>
                  </div>
                )}

                {/* STEP 3: LOADING SPINNER IN-PROGRESS SCREEN */}
                {resetState.step === 'deleting' && (
                  <div className="flex flex-col items-center justify-center py-8 text-center">
                    <Cloud className="w-12 h-12 text-red-500 animate-bounce mb-3" />
                    <h4 className="text-lg font-bold text-slate-800">Sedang Memadam Pangkalan Data...</h4>
                    <p className="text-slate-400 text-xs mt-1">Sila tunggu seketika semasa sistem membersihkan sisa data.</p>
                  </div>
                )}

                {/* STEP 4: SUCCESS REINFORCEMENT SCREEN */}
                {resetState.step === 'success' && (
                  <div className="text-center py-4">
                    <div className="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-3">
                      <Check className="w-6 h-6" />
                    </div>
                    <h3 className="text-lg font-bold text-slate-800">Pemadaman Berjaya!</h3>
                    <p className="text-slate-500 text-sm mt-1 px-4">
                      Pangkalan data awan Firebase anda telah dikosongkan sepenuhnya. Bilangan responden kini diset semula kepada 0.
                    </p>
                    <button 
                      onClick={closeResetModal}
                      className="mt-6 w-full py-2 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-xl text-sm transition-all shadow-md active:scale-95"
                    >
                      Kembali Ke Dashboard
                    </button>
                  </div>
                )}

                {/* STEP 5: ROBUST COMPREHENSIVE ERROR REPORT SCREEN */}
                {resetState.step === 'error' && (
                  <div className="py-2">
                    <div className="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-3">
                      <AlertCircle className="w-6 h-6" />
                    </div>
                    <h3 className="text-lg font-bold text-slate-800 text-center">Gagal Memproses Pembersihan</h3>
                    <p className="text-red-600 text-xs mt-2 bg-red-50 p-3 rounded-lg border border-red-100 break-words leading-relaxed">
                      {resetState.error}
                    </p>
                    <button 
                      onClick={closeResetModal}
                      className="mt-6 w-full py-2 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl text-sm transition-all"
                    >
                      Tutup
                    </button>
                  </div>
                )}

              </div>
            </div>
          )}

          {/* 👑 PROGRESS TRACKER RESET MODAL */}
          {trackerResetModalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm">
              <div className="bg-slate-900 border border-slate-700 max-w-sm w-full rounded-2xl p-6 shadow-2xl space-y-4">
                <div className="flex items-center gap-3 text-rose-500">
                  <span className="p-3 bg-rose-500/10 rounded-full text-xl"><i className="fa-solid fa-triangle-exclamation"></i></span>
                  <div>
                    <h3 className="text-lg font-bold text-white">Reset Semua Progres?</h3>
                    <p className="text-xs text-slate-400">Langkah ini tidak boleh diundurkan.</p>
                  </div>
                </div>
                <p className="text-sm text-slate-300">Semua kemajuan tugasan bagi 31 unit jawatankuasa akan dikembalikan ke 0%.</p>
                <div className="flex gap-3 pt-2">
                  <button onClick={() => setTrackerResetModalOpen(false)} className="flex-1 py-2.5 bg-slate-800 hover:bg-slate-755 text-slate-300 font-semibold rounded-xl text-xs transition border border-slate-700">Batal</button>
                  <button onClick={handleConfirmTrackerReset} className="flex-1 py-2.5 bg-rose-600 hover:bg-rose-500 text-white font-semibold rounded-xl text-xs transition shadow-lg shadow-rose-600/20">Ya, Set Semula</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
